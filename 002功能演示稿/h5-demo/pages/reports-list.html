<style>
/* 日报列表样式 */
.reports-filter { display: flex; align-items: center; gap: var(--spacing-md); margin-bottom: var(--spacing-base); flex-wrap: wrap; }
.reports-filter label { font-size: var(--font-size-sm); color: var(--color-text-secondary); white-space: nowrap; }
.reports-filter .input { width: 150px; }
.reports-income { font-weight: 600; color: var(--color-text-primary); }

/* 日报详情抽屉内容样式 */
.report-drawer-summary { display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--spacing-base); margin-bottom: var(--spacing-xl); }
.report-drawer-summary-item { background: var(--color-bg-page); border-radius: var(--radius-md); padding: var(--spacing-base); text-align: center; }
.report-drawer-summary-item .summary-label { font-size: var(--font-size-sm); color: var(--color-text-tertiary); margin-bottom: var(--spacing-xs); }
.report-drawer-summary-item .summary-value { font-size: 24px; font-weight: 700; color: var(--color-text-primary); }
.report-drawer-summary-item .summary-value.income { color: var(--color-primary); }
.report-drawer-section-title { font-size: var(--font-size-md); font-weight: 600; margin-bottom: var(--spacing-md); padding-left: var(--spacing-xs); border-left: 3px solid var(--color-primary); }
</style>

<div class="page-container" id="reportsRoot">
  <!-- 列表视图（始终可见） -->
  <div id="reportsListView">
    <div class="page-header">
      <h2>日报</h2>
    </div>

    <div class="card" style="padding:var(--spacing-base) var(--spacing-lg);margin-bottom:var(--spacing-base);">
      <div class="reports-filter">
        <label>日期范围：</label>
        <input type="date" class="input" id="reportDateStart" title="开始日期">
        <span style="color:var(--color-text-tertiary)">至</span>
        <input type="date" class="input" id="reportDateEnd" title="结束日期">
        <button class="btn btn-primary" id="reportFilterBtn">查询</button>
        <button class="btn" id="reportFilterReset">重置</button>
      </div>
    </div>

    <div class="card">
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>日期</th>
              <th>收入(元)</th>
              <th>订单数</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="reportsTableBody"></tbody>
        </table>
      </div>
      <div id="reportsPagination" style="padding:0 var(--spacing-base);"></div>
    </div>
  </div>

  <!-- 右侧详情抽屉 -->
  <div class="drawer-overlay report-drawer-overlay" id="reportDrawerOverlay" style="display:none;">
    <div class="drawer report-drawer" id="reportDrawer">
      <div class="drawer-header">
        <h3 class="drawer-title" id="reportDrawerTitle">日报详情</h3>
        <button class="drawer-close" id="reportDrawerClose">✕</button>
      </div>
      <div class="drawer-body" id="reportDrawerBody"></div>
      <div class="drawer-footer">
        <button class="btn btn-primary drawer-btn-main" id="reportDrawerBtnClose">关闭</button>
      </div>
    </div>
  </div>
</div>

<script>
(function () {
  var DATA = window.MockData.reports;
  var pageSize = 20;
  var currentPage = 1;
  var filteredData = DATA.slice();
  var dateStart = '';
  var dateEnd = '';

  function formatMoney(n) {
    return n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  }

  function renderList() {
    var start = (currentPage - 1) * pageSize;
    var pageData = filteredData.slice(start, start + pageSize);
    var tbody = document.getElementById('reportsTableBody');
    var rows = pageData.map(function (r) {
      return '<tr>' +
        '<td>' + r.date + '</td>' +
        '<td><span class="reports-income">¥' + formatMoney(r.income) + '</span></td>' +
        '<td>' + r.orders + '</td>' +
        '<td><button class="btn btn-link btn-sm" data-action="detail" data-date="' + r.date + '">查看详情</button></td>' +
        '</tr>';
    }).join('');
    if (!rows) {
      rows = '<tr><td colspan="4"><div class="empty-state"><div class="empty-state-text">暂无日报数据</div></div></td></tr>';
    }
    tbody.innerHTML = rows;

    renderPagination();
  }

  function renderPagination() {
    var totalPages = Math.ceil(filteredData.length / pageSize);
    var container = document.getElementById('reportsPagination');
    if (totalPages <= 1) {
      container.innerHTML = '';
      return;
    }
    var html = '<div class="pagination">';
    html += '<div class="page-btn" data-pg="prev"' + (currentPage === 1 ? ' disabled' : '') + '>‹</div>';
    for (var i = 1; i <= totalPages; i++) {
      html += '<div class="page-btn' + (i === currentPage ? ' active' : '') + '" data-pg="' + i + '">' + i + '</div>';
    }
    html += '<div class="page-btn" data-pg="next"' + (currentPage === totalPages ? ' disabled' : '') + '>›</div>';
    html += '<span class="page-info">共 ' + filteredData.length + ' 条</span>';
    html += '</div>';
    container.innerHTML = html;
  }

  function applyFilter() {
    dateStart = document.getElementById('reportDateStart').value;
    dateEnd = document.getElementById('reportDateEnd').value;
    filteredData = DATA.filter(function (r) {
      if (dateStart && r.date < dateStart) return false;
      if (dateEnd && r.date > dateEnd) return false;
      return true;
    });
    currentPage = 1;
    renderList();
  }

  // ---- 抽屉逻辑 ----
  function openDrawer(date) {
    var report = DATA.find(function (r) { return r.date === date; });
    if (!report) return;

    var overlay = document.getElementById('reportDrawerOverlay');

    // 标题
    document.getElementById('reportDrawerTitle').textContent = '日报详情 — ' + report.date;

    // 正文
    var promotionCount = report.details ? report.details.length : 0;
    var html = '';

    html += '<div class="report-drawer-summary">';
    html += '<div class="report-drawer-summary-item"><div class="summary-label">收入(元)</div><div class="summary-value income">¥' + formatMoney(report.income) + '</div></div>';
    html += '<div class="report-drawer-summary-item"><div class="summary-label">订单数</div><div class="summary-value">' + report.orders + '</div></div>';
    html += '<div class="report-drawer-summary-item"><div class="summary-label">推广位数量</div><div class="summary-value">' + promotionCount + '</div></div>';
    html += '<div class="report-drawer-summary-item"><div class="summary-label">日期</div><div class="summary-value" style="font-size:20px;">' + report.date + '</div></div>';
    html += '</div>';

    if (report.details && report.details.length > 0) {
      html += '<div class="report-drawer-section-title">各推广位明细</div>';
      html += '<div class="table-wrapper"><table><thead><tr><th>推广位名称</th><th>收入(元)</th><th>订单数</th></tr></thead><tbody>';
      report.details.forEach(function (d) {
        html += '<tr><td>' + d.promotion + '</td><td><span class="reports-income">¥' + formatMoney(d.income) + '</span></td><td>' + d.orders + '</td></tr>';
      });
      html += '</tbody></table></div>';
    }

    document.getElementById('reportDrawerBody').innerHTML = html;
    document.getElementById('reportDrawerBody').scrollTop = 0;

    // 打开（带动画）
    overlay.classList.add('modal-animated');
    overlay.style.display = 'flex';
  }

  function closeDrawer() {
    var overlay = document.getElementById('reportDrawerOverlay');
    overlay.classList.add('modal-closing');
    var done = false;
    var onEnd = function () {
      if (done) return;
      done = true;
      overlay.removeEventListener('animationend', onEnd);
      overlay.style.display = 'none';
      overlay.classList.remove('modal-closing', 'modal-animated');
    };
    overlay.addEventListener('animationend', onEnd);
    setTimeout(onEnd, 350);
  }

  // 事件委托
  document.getElementById('reportsRoot').addEventListener('click', function (e) {
    var btn = e.target.closest('[data-action="detail"]');
    if (btn) {
      openDrawer(btn.getAttribute('data-date'));
      return;
    }

    var pgBtn = e.target.closest('[data-pg]');
    if (pgBtn && !pgBtn.disabled) {
      var pg = pgBtn.getAttribute('data-pg');
      if (pg === 'prev' && currentPage > 1) { currentPage--; renderList(); }
      else if (pg === 'next' && currentPage < Math.ceil(filteredData.length / pageSize)) { currentPage++; renderList(); }
      else if (!isNaN(+pg)) { currentPage = +pg; renderList(); }
    }
  });

  document.getElementById('reportFilterBtn').addEventListener('click', applyFilter);
  document.getElementById('reportFilterReset').addEventListener('click', function () {
    document.getElementById('reportDateStart').value = '';
    document.getElementById('reportDateEnd').value = '';
    applyFilter();
  });

  // 抽屉关闭事件
  document.getElementById('reportDrawerClose').addEventListener('click', closeDrawer);
  document.getElementById('reportDrawerBtnClose').addEventListener('click', closeDrawer);
  document.getElementById('reportDrawerOverlay').addEventListener('click', function (e) {
    if (e.target === e.currentTarget) closeDrawer();
  });

  // ESC 关闭
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') {
      var overlay = document.getElementById('reportDrawerOverlay');
      if (overlay.style.display === 'flex') closeDrawer();
    }
  });

  // 初始渲染
  renderList();
})();
</script>
