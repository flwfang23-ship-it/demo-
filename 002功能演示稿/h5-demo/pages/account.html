<style>
/* C06 账号设置样式 */
.account-form { max-width: 520px; }
.account-form .form-group { margin-bottom: var(--spacing-lg); }
.account-form .form-label { display: block; margin-bottom: var(--spacing-sm); font-size: var(--font-size-base); color: var(--color-text-primary); font-weight: 500; }
.account-form .readonly-field { height: 32px; line-height: 32px; padding: 0 12px; background: #f5f5f5; border: 1px solid var(--color-border-light); border-radius: var(--radius-md); color: var(--color-text-tertiary); font-size: var(--font-size-base); }
.password-form { max-width: 400px; }
.password-form .form-group { margin-bottom: var(--spacing-lg); }
.password-form .form-label { display: block; margin-bottom: var(--spacing-sm); font-size: var(--font-size-base); color: var(--color-text-primary); font-weight: 500; }
.log-filter { display: flex; align-items: center; gap: var(--spacing-md); margin-bottom: var(--spacing-base); flex-wrap: wrap; }
.log-filter label { font-size: var(--font-size-sm); color: var(--color-text-secondary); white-space: nowrap; }
.log-filter .input { width: 150px; }
.log-action-tag { display: inline-block; padding: 2px 8px; border-radius: var(--radius-sm); font-size: var(--font-size-xs); background: #f0f0f0; color: var(--color-text-secondary); }
.log-detail-text { max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: inline-block; }
.account-info-actions { display: flex; gap: var(--spacing-md); margin-top: var(--spacing-xl); }
.account-tab-content { padding-top: var(--spacing-base); }
</style>

<div class="page-container" id="accountRoot">
  <div class="page-header">
    <h2>⚙️ 账户设置</h2>
  </div>

  <!-- 内部Tab切换 -->
  <div class="tabs" id="accountTabs">
    <div class="tab-item active" data-tab="user">账号信息</div>
    <div class="tab-item" data-tab="info">企业信息</div>
    <div class="tab-item" data-tab="pwd">修改密码</div>
    <div class="tab-item" data-tab="log">操作日志</div>
  </div>

  <!-- Tab 0: 账号信息 -->
  <div class="account-tab-content" id="tabUser">
    <div class="card" style="padding:var(--spacing-xl);">
      <div class="account-user-card">
        <div class="user-avatar-row">
          <div class="user-avatar-circle" id="userAvatar">阳</div>
          <div class="user-name-block">
            <span class="user-display-name" id="userDisplayName">--</span>
            <span class="user-role-tag" id="userRoleTag">--</span>
          </div>
        </div>
        <div class="user-detail-grid">
          <div class="user-detail-item">
            <span class="detail-label">注册手机号</span>
            <span class="detail-value" id="userPhone">--</span>
          </div>
          <div class="user-detail-item">
            <span class="detail-label">账号角色</span>
            <span class="detail-value" id="userRole">--</span>
          </div>
          <div class="user-detail-item">
            <span class="detail-label">注册时间</span>
            <span class="detail-value" id="userCreatedAt">--</span>
          </div>
          <div class="user-detail-item">
            <span class="detail-label">最后登录时间</span>
            <span class="detail-value" id="userLastLogin">--</span>
          </div>
          <div class="user-detail-item" style="grid-column: 1 / -1;">
            <span class="detail-label">账号状态</span>
            <span id="userStatus"></span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Tab 1: 企业信息 -->
  <div class="account-tab-content" id="tabInfo" style="display:none;">
    <!-- 营业执照OCR上传区 -->
    <div class="card" style="padding:var(--spacing-xl);margin-bottom:var(--spacing-base);">
      <div class="ocr-section">
        <div class="ocr-section-title">
          📄 营业执照上传识别
          <span class="ocr-demo-badge">演示模式</span>
        </div>

        <!-- 上传区 -->
        <div class="ocr-upload-zone" id="ocrUploadZone">
          <div class="ocr-upload-icon">📤</div>
          <div class="ocr-upload-text">点击或拖拽上传营业执照</div>
          <div class="ocr-upload-hint">支持 JPG / PNG，大小不超过 5MB</div>
          <input type="file" class="ocr-upload-input" id="ocrFileInput" accept="image/jpeg,image/png">
        </div>

        <!-- 预览 + 识别区 -->
        <div class="ocr-preview-area" id="ocrPreviewArea">
          <div class="ocr-preview-header">
            <span class="ocr-preview-title">📷 营业执照预览</span>
            <button class="btn btn-link" id="ocrReupload">重新上传</button>
          </div>
          <img class="ocr-preview-img" id="ocrPreviewImg" src="" alt="营业执照预览">
          <!-- 识别中 -->
          <div class="ocr-scanning" id="ocrScanning">
            <span>识别中</span>
            <span class="scanning-dot"></span>
            <span class="scanning-dot"></span>
            <span class="scanning-dot"></span>
            <span class="scanning-dot"></span>
          </div>
          <!-- 识别结果 -->
          <div class="ocr-result-card" id="ocrResultCard">
            <div class="ocr-result-title">✅ 识别完成</div>
            <div class="ocr-result-grid" id="ocrResultGrid"></div>
            <div class="ocr-result-actions">
              <button class="btn btn-primary" id="ocrFillBtn">一键填充到企业信息</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 企业信息表单 -->
    <div class="card" style="padding:var(--spacing-xl);">
      <div class="account-form" id="accountInfoForm">
        <div class="form-group">
          <div class="form-label">公司名称</div>
          <input type="text" class="input input-lg" id="infoCompany" maxlength="50" placeholder="请输入公司名称">
        </div>
        <div class="form-group">
          <div class="form-label">统一社会信用代码</div>
          <input type="text" class="input input-lg" id="infoCreditCode" maxlength="18" placeholder="请输入统一社会信用代码">
        </div>
        <div class="form-group">
          <div class="form-label">法定代表人</div>
          <input type="text" class="input input-lg" id="infoLegalPerson" maxlength="20" placeholder="请输入法定代表人">
        </div>
        <div class="form-group">
          <div class="form-label">联系人</div>
          <input type="text" class="input input-lg" id="infoContact" maxlength="20" placeholder="请输入联系人">
        </div>
        <div class="form-group">
          <div class="form-label">联系电话</div>
          <input type="text" class="input input-lg" id="infoPhone" maxlength="15" placeholder="请输入联系电话">
        </div>
        <div class="form-group">
          <div class="form-label">注册手机号（不可修改）</div>
          <div class="readonly-field" id="infoRegPhone">--</div>
        </div>
        <div class="form-group">
          <div class="form-label">注册时间</div>
          <div class="readonly-field" id="infoCreatedAt">--</div>
        </div>
        <div class="account-info-actions">
          <button class="btn btn-primary" id="btnSaveInfo">保存</button>
          <button class="btn" id="btnResetInfo">重置</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Tab 2: 修改密码 -->
  <div class="account-tab-content" id="tabPwd" style="display:none;">
    <div class="card" style="padding:var(--spacing-xl);max-width:480px;">
      <!-- 步骤条 -->
      <div class="pwd-steps" id="pwdSteps">
        <div class="pwd-step current" data-pwd-step="1">
          <span class="step-dot">1</span>
          <span>短信验证</span>
        </div>
        <div class="pwd-step-line" data-pwd-line="1"></div>
        <div class="pwd-step" data-pwd-step="2">
          <span class="step-dot">2</span>
          <span>设置新密码</span>
        </div>
      </div>

      <!-- 步骤1: 短信验证 -->
      <div class="pwd-step-panel active" id="pwdPanel1">
        <div class="password-form">
          <div class="form-group">
            <div class="form-label">验证码将发送至注册手机号</div>
            <div style="font-size:14px;color:var(--color-primary);font-weight:500;margin-bottom:12px;" id="pwdPhoneDisplay">--</div>
            <div style="display:flex;gap:10px;max-width:300px;">
              <input type="text" class="input input-lg" id="pwdSmsCode" placeholder="请输入6位验证码" maxlength="6" style="flex:1;">
              <button class="btn" id="btnPwdSms" style="width:120px;flex-shrink:0;white-space:nowrap;">获取验证码</button>
            </div>
            <div class="form-error-msg" id="pwdSmsError" style="display:none;font-size:12px;color:var(--color-danger);margin-top:4px;"></div>
          </div>
        </div>
        <div class="account-info-actions">
          <button class="btn btn-primary" id="btnPwdVerify">验证并继续</button>
        </div>
      </div>

      <!-- 步骤2: 设置新密码 -->
      <div class="pwd-step-panel" id="pwdPanel2">
        <div class="password-form">
          <div class="form-group">
            <div class="form-label">新密码</div>
            <input type="password" class="input input-lg" id="pwdNew" placeholder="6-20位，需包含字母和数字" maxlength="20">
            <div class="form-error-msg" id="pwdNewError" style="display:none;font-size:12px;color:var(--color-danger);margin-top:4px;"></div>
          </div>
          <div class="form-group">
            <div class="form-label">确认新密码</div>
            <input type="password" class="input input-lg" id="pwdConfirm" placeholder="请再次输入新密码" maxlength="20">
            <div class="form-error-msg" id="pwdConfirmError" style="display:none;font-size:12px;color:var(--color-danger);margin-top:4px;"></div>
          </div>
        </div>
        <div class="account-info-actions">
          <button class="btn btn-primary" id="btnChangePwd">确认修改</button>
          <button class="btn" id="btnPwdBack">上一步</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Tab 3: 操作日志 -->
  <div class="account-tab-content" id="tabLog" style="display:none;">
    <div class="card" style="padding:var(--spacing-base) var(--spacing-lg);margin-bottom:var(--spacing-base);">
      <div class="log-filter">
        <label>时间范围：</label>
        <input type="date" class="input" id="logDateStart" title="开始日期">
        <span style="color:var(--color-text-tertiary)">至</span>
        <input type="date" class="input" id="logDateEnd" title="结束日期">
        <button class="btn btn-primary" id="logFilterBtn">查询</button>
        <button class="btn" id="logFilterReset">重置</button>
      </div>
    </div>

    <div class="card">
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>操作时间</th>
              <th>操作类型</th>
              <th>IP地址</th>
              <th>详情</th>
            </tr>
          </thead>
          <tbody id="logTableBody"></tbody>
        </table>
      </div>
      <div id="logPagination" style="padding:0 var(--spacing-base);"></div>
    </div>
  </div>
</div>

<script>
(function () {
  var merchant = window.MockData.currentMerchant;
  var LOGS = window.MockData.operationLogs;
  var logPageSize = 20;
  var logCurrentPage = 1;
  var logFiltered = LOGS.slice();
  var logDateStart = '';
  var logDateEnd = '';

  // ===== 账号信息 =====
  function loadUserInfo() {
    document.getElementById('userAvatar').textContent = merchant.avatar || '阳';
    document.getElementById('userDisplayName').textContent = merchant.name || '--';
    document.getElementById('userRoleTag').textContent = merchant.role || '--';
    document.getElementById('userPhone').textContent = merchant.phone || '--';
    document.getElementById('userRole').textContent = merchant.role || '--';
    document.getElementById('userCreatedAt').textContent = merchant.createdAt || '--';
    document.getElementById('userLastLogin').textContent = merchant.lastLoginTime || '--';

    var statusMap = {
      'normal': '<span class="status-tag normal">正常</span>',
      'disabled': '<span class="status-tag disabled">已禁用</span>',
      'pending': '<span class="status-tag pending">待审核</span>'
    };
    document.getElementById('userStatus').innerHTML = statusMap[merchant.accountStatus] || statusMap['normal'];
  }

  // ===== 企业信息 =====
  function loadInfo() {
    document.getElementById('infoCompany').value = merchant.company || '';
    document.getElementById('infoCreditCode').value = merchant.creditCode || '';
    document.getElementById('infoLegalPerson').value = merchant.legalPerson || '';
    document.getElementById('infoContact').value = merchant.contact || '';
    document.getElementById('infoPhone').value = merchant.contactPhone || '';
    document.getElementById('infoRegPhone').textContent = merchant.phone || '--';
    document.getElementById('infoCreatedAt').textContent = merchant.createdAt || '--';
  }

  document.getElementById('btnSaveInfo').addEventListener('click', function () {
    merchant.company = document.getElementById('infoCompany').value.trim();
    merchant.creditCode = document.getElementById('infoCreditCode').value.trim();
    merchant.legalPerson = document.getElementById('infoLegalPerson').value.trim();
    merchant.contact = document.getElementById('infoContact').value.trim();
    merchant.contactPhone = document.getElementById('infoPhone').value.trim();
    window.showToast('企业信息保存成功', 'success');
    var nameEl = document.querySelector('.sidebar-user-name');
    if (nameEl && merchant.company) nameEl.textContent = merchant.company;
  });

  document.getElementById('btnResetInfo').addEventListener('click', function () {
    loadInfo();
    window.showToast('已重置', 'info');
  });

  // ===== 营业执照OCR =====
  var ocrData = window.MockData.ocrMockResult;
  var ocrFileInput = document.getElementById('ocrFileInput');
  var ocrUploadZone = document.getElementById('ocrUploadZone');
  var ocrPreviewArea = document.getElementById('ocrPreviewArea');
  var ocrPreviewImg = document.getElementById('ocrPreviewImg');
  var ocrScanning = document.getElementById('ocrScanning');
  var ocrResultCard = document.getElementById('ocrResultCard');
  var ocrResultGrid = document.getElementById('ocrResultGrid');

  function handleOcrFile(file) {
    if (!file || !file.type.match(/^image\/(jpeg|png)$/)) {
      window.showToast('请选择 JPG 或 PNG 格式的图片', 'error');
      return;
    }
    if (file.size > 5 * 1024 * 1024) {
      window.showToast('图片大小不能超过 5MB', 'error');
      return;
    }

    var reader = new FileReader();
    reader.onload = function (e) {
      ocrPreviewImg.src = e.target.result;
      // 显示预览区，隐藏上传区
      ocrUploadZone.style.display = 'none';
      ocrPreviewArea.classList.add('show');
      ocrScanning.style.display = 'flex';
      ocrResultCard.classList.remove('show');

      // 模拟OCR识别延迟
      setTimeout(function () {
        ocrScanning.style.display = 'none';
        showOcrResult();
      }, 2000);
    };
    reader.readAsDataURL(file);
  }

  function showOcrResult() {
    var items = [
      { label: '统一社会信用代码', value: ocrData.creditCode },
      { label: '公司名称', value: ocrData.companyName },
      { label: '法定代表人', value: ocrData.legalPerson },
      { label: '注册资本', value: ocrData.registeredCapital },
      { label: '成立日期', value: ocrData.establishedDate },
      { label: '经营范围', value: ocrData.businessScope, full: true }
    ];
    var html = '';
    items.forEach(function (item) {
      var cls = 'ocr-result-item' + (item.full ? ' full-width' : '');
      html += '<div class="' + cls + '"><span class="ocr-label">' + item.label + '</span><span class="ocr-value">' + item.value + '</span></div>';
    });
    ocrResultGrid.innerHTML = html;
    ocrResultCard.classList.add('show');
  }

  ocrFileInput.addEventListener('change', function () {
    if (this.files && this.files[0]) {
      handleOcrFile(this.files[0]);
    }
  });

  // 拖拽支持
  ocrUploadZone.addEventListener('dragover', function (e) { e.preventDefault(); this.style.borderColor = '#1677ff'; });
  ocrUploadZone.addEventListener('dragleave', function () { this.style.borderColor = '#d9d9d9'; });
  ocrUploadZone.addEventListener('drop', function (e) {
    e.preventDefault();
    this.style.borderColor = '#d9d9d9';
    if (e.dataTransfer.files && e.dataTransfer.files[0]) {
      handleOcrFile(e.dataTransfer.files[0]);
    }
  });

  document.getElementById('ocrReupload').addEventListener('click', function () {
    ocrUploadZone.style.display = '';
    ocrPreviewArea.classList.remove('show');
    ocrResultCard.classList.remove('show');
    ocrPreviewImg.src = '';
    ocrFileInput.value = '';
  });

  document.getElementById('ocrFillBtn').addEventListener('click', function () {
    document.getElementById('infoCompany').value = ocrData.companyName;
    document.getElementById('infoCreditCode').value = ocrData.creditCode;
    document.getElementById('infoLegalPerson').value = ocrData.legalPerson;
    window.showToast('营业执照信息已填充到表单，请核对后保存', 'success');
  });

  // ===== 修改密码（两步流程：短信验证 → 设置新密码） =====
  var pwdStep = 1;
  var pwdSmsTimer = null;
  var pwdSmsCountdown = 0;

  function setPwdStep(step) {
    pwdStep = step;
    // 更新步骤条
    document.querySelectorAll('#pwdSteps .pwd-step').forEach(function (el) {
      var s = parseInt(el.getAttribute('data-pwd-step'));
      el.classList.remove('current', 'done');
      if (s < step) el.classList.add('done');
      if (s === step) el.classList.add('current');
    });
    document.querySelectorAll('#pwdSteps .pwd-step-line').forEach(function (el) {
      var s = parseInt(el.getAttribute('data-pwd-line'));
      el.classList.toggle('done', s < step);
    });
    // 切换面板
    ['pwdPanel1', 'pwdPanel2'].forEach(function (id, i) {
      document.getElementById(id).classList.toggle('active', (i + 1) === step);
    });
    // 预填手机号
    if (step === 1) {
      document.getElementById('pwdPhoneDisplay').textContent = merchant.phone || '--';
    }
  }

  // 步骤1 → 2
  document.getElementById('btnPwdVerify').addEventListener('click', function () {
    var smsCode = document.getElementById('pwdSmsCode').value.trim();
    var errEl = document.getElementById('pwdSmsError');
    errEl.style.display = 'none';

    if (smsCode !== '123456') {
      errEl.textContent = '验证码错误（演示用：123456）';
      errEl.style.display = 'block';
      return;
    }
    setPwdStep(2);
  });

  // 步骤2 → 修改
  document.getElementById('btnChangePwd').addEventListener('click', function () {
    var newPwd = document.getElementById('pwdNew').value;
    var confirmPwd = document.getElementById('pwdConfirm').value;
    var errEl1 = document.getElementById('pwdNewError');
    var errEl2 = document.getElementById('pwdConfirmError');
    errEl1.style.display = 'none';
    errEl2.style.display = 'none';

    if (!newPwd) {
      errEl1.textContent = '请输入新密码';
      errEl1.style.display = 'block';
      return;
    }
    if (newPwd.length < 6 || newPwd.length > 20) {
      errEl1.textContent = '新密码长度需为6-20位';
      errEl1.style.display = 'block';
      return;
    }
    if (!/[a-zA-Z]/.test(newPwd) || !/\d/.test(newPwd)) {
      errEl1.textContent = '密码需包含字母和数字';
      errEl1.style.display = 'block';
      return;
    }
    if (newPwd !== confirmPwd) {
      errEl2.textContent = '两次输入的新密码不一致';
      errEl2.style.display = 'block';
      return;
    }

    window.showToast('密码修改成功，请重新登录', 'success');
    // 重置表单
    document.getElementById('pwdSmsCode').value = '';
    document.getElementById('pwdNew').value = '';
    document.getElementById('pwdConfirm').value = '';
    setPwdStep(1);
  });

  // 返回上一步
  document.getElementById('btnPwdBack').addEventListener('click', function () { setPwdStep(1); });

  // 发送验证码
  document.getElementById('btnPwdSms').addEventListener('click', function () {
    if (pwdSmsCountdown > 0) return;
    pwdSmsCountdown = 60;
    var btn = document.getElementById('btnPwdSms');
    btn.disabled = true;
    btn.textContent = pwdSmsCountdown + 's后重发';
    pwdSmsTimer = setInterval(function () {
      pwdSmsCountdown--;
      if (pwdSmsCountdown <= 0) {
        clearInterval(pwdSmsTimer);
        btn.disabled = false;
        btn.textContent = '获取验证码';
      } else {
        btn.textContent = pwdSmsCountdown + 's后重发';
      }
    }, 1000);
    window.showToast('验证码已发送（演示用：123456）', 'info');
  });

  // ===== 操作日志 =====
  function renderLogs() {
    var start = (logCurrentPage - 1) * logPageSize;
    var pageData = logFiltered.slice(start, start + logPageSize);
    var tbody = document.getElementById('logTableBody');
    var rows = pageData.map(function (l) {
      return '<tr>' +
        '<td>' + l.time + '</td>' +
        '<td><span class="log-action-tag">' + l.action + '</span></td>' +
        '<td>' + l.ip + '</td>' +
        '<td><span class="log-detail-text" title="' + l.detail + '">' + l.detail + '</span></td>' +
        '</tr>';
    }).join('');
    if (!rows) {
      rows = '<tr><td colspan="4"><div class="empty-state"><div class="empty-state-text">暂无操作日志</div></div></td></tr>';
    }
    tbody.innerHTML = rows;
    renderLogPagination();
  }

  function renderLogPagination() {
    var total = Math.ceil(logFiltered.length / logPageSize);
    var container = document.getElementById('logPagination');
    if (total <= 1) { container.innerHTML = ''; return; }
    var html = '<div class="pagination">';
    html += '<div class="page-btn" data-lpg="prev"' + (logCurrentPage === 1 ? ' disabled' : '') + '>‹</div>';
    for (var i = 1; i <= total; i++) {
      html += '<div class="page-btn' + (i === logCurrentPage ? ' active' : '') + '" data-lpg="' + i + '">' + i + '</div>';
    }
    html += '<div class="page-btn" data-lpg="next"' + (logCurrentPage === total ? ' disabled' : '') + '>›</div>';
    html += '<span class="page-info">共 ' + logFiltered.length + ' 条</span>';
    html += '</div>';
    container.innerHTML = html;
  }

  function applyLogFilter() {
    logDateStart = document.getElementById('logDateStart').value;
    logDateEnd = document.getElementById('logDateEnd').value;
    logFiltered = LOGS.filter(function (l) {
      var d = l.time.substring(0, 10);
      if (logDateStart && d < logDateStart) return false;
      if (logDateEnd && d > logDateEnd) return false;
      return true;
    });
    logCurrentPage = 1;
    renderLogs();
  }

  // 日志分页事件委托
  document.getElementById('tabLog').addEventListener('click', function (e) {
    var pgBtn = e.target.closest('[data-lpg]');
    if (pgBtn && !pgBtn.disabled) {
      var pg = pgBtn.getAttribute('data-lpg');
      if (pg === 'prev' && logCurrentPage > 1) { logCurrentPage--; renderLogs(); }
      else if (pg === 'next' && logCurrentPage < Math.ceil(logFiltered.length / logPageSize)) { logCurrentPage++; renderLogs(); }
      else if (!isNaN(+pg)) { logCurrentPage = +pg; renderLogs(); }
    }
  });

  document.getElementById('logFilterBtn').addEventListener('click', applyLogFilter);
  document.getElementById('logFilterReset').addEventListener('click', function () {
    document.getElementById('logDateStart').value = '';
    document.getElementById('logDateEnd').value = '';
    applyLogFilter();
  });

  // ===== Tab切换 =====
  var tabs = {
    user: document.getElementById('tabUser'),
    info: document.getElementById('tabInfo'),
    pwd: document.getElementById('tabPwd'),
    log: document.getElementById('tabLog')
  };

  document.getElementById('accountTabs').addEventListener('click', function (e) {
    var tab = e.target.closest('.tab-item');
    if (!tab) return;
    var key = tab.getAttribute('data-tab');
    document.querySelectorAll('#accountTabs .tab-item').forEach(function (t) { t.classList.remove('active'); });
    tab.classList.add('active');
    Object.keys(tabs).forEach(function (k) { tabs[k].style.display = k === key ? 'block' : 'none'; });
    if (key === 'log' && !document.getElementById('logTableBody').innerHTML) {
      renderLogs();
    }
  });

  // ===== 外部Tab预选（来自侧边栏菜单点击） =====
  var preTab = window.__pageTab;
  if (preTab) {
    var tabEl = document.querySelector('#accountTabs .tab-item[data-tab="' + preTab + '"]');
    if (tabEl) {
      // 切换到目标Tab
      document.querySelectorAll('#accountTabs .tab-item').forEach(function (t) { t.classList.remove('active'); });
      tabEl.classList.add('active');
      Object.keys(tabs).forEach(function (k) { tabs[k].style.display = k === preTab ? 'block' : 'none'; });
      if (preTab === 'log') renderLogs();
      if (preTab === 'pwd') setPwdStep(1);
    }
    window.__pageTab = null;
  }

  // 初始化
  loadUserInfo();
  loadInfo();
})();
</script>
