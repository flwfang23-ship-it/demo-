<div class="page-container" id="mpListPage">

  <!-- 页面头部 -->
  <div class="page-header">
    <h2>小程序管理</h2>
    <div style="display:flex;gap:12px;align-items:center;">
      <span style="font-size:12px;color:#999;background:#E6F7FF;border:1px solid #91D5FF;padding:4px 12px;border-radius:12px;">演示模式：有小程序（老商户）</span>
      <button class="btn btn-primary" id="btnRegisterMp">+ 注册小程序</button>
      <button class="btn" id="btnBatchSubscribe" style="display:none;">批量开启订阅</button>
      <button class="btn" id="btnBatchUnsubscribe" style="display:none;">批量关闭订阅</button>
    </div>
  </div>

  <!-- 搜索筛选栏 -->
  <div class="card" style="margin-bottom:16px;">
    <div class="card-body">
      <div class="search-bar">
        <input type="text" class="input" id="mpSearchInput" placeholder="搜索小程序名称/AppID" style="width:260px;">
        <select class="select" id="mpStatusFilter" style="width:140px;">
          <option value="">全部状态</option>
          <option value="normal">正常</option>
          <option value="auditing">审核中</option>
          <option value="stopped">已停用</option>
        </select>
        <select class="select" id="mpSubscribeFilter" style="width:160px;">
          <option value="">订阅状态：全部</option>
          <option value="on">已开启</option>
          <option value="off">已关闭</option>
        </select>
        <button class="btn btn-primary" id="btnMpSearch">查询</button>
        <button class="btn" id="btnMpReset">重置</button>
      </div>
    </div>
  </div>

  <!-- 表格 -->
  <div class="card">
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th style="width:40px;"><input type="checkbox" class="checkbox" id="mpSelectAll" title="全选"></th>
            <th>小程序名称</th>
            <th>AppID</th>
            <th>小程序类型</th>
            <th>部署状态</th>
            <th>订阅开关</th>
            <th>注册时间</th>
            <th>状态</th>
            <th style="width:180px;">操作</th>
          </tr>
        </thead>
        <tbody id="mpTableBody">
          <!-- JS动态渲染 -->
        </tbody>
      </table>
    </div>
    <!-- 分页 -->
    <div style="padding:0 16px 16px;">
      <div class="pagination" id="mpPagination">
        <!-- JS动态渲染 -->
      </div>
    </div>
  </div>

</div>

<!-- ====== 注册/编辑小程序弹窗 ====== -->
<div class="confirm-overlay" id="mpFormModal" style="display:none;">
  <div class="confirm-box" style="width:520px;">
    <div class="confirm-header" id="mpFormTitle">注册小程序</div>
    <div class="confirm-body">
      <div class="form-group">
        <label class="form-label"><span class="required">*</span>小程序名称</label>
        <input type="text" class="input" id="mpFormName" placeholder="请输入小程序名称" maxlength="30">
      </div>
      <div class="form-group">
        <label class="form-label"><span class="required">*</span>AppID</label>
        <input type="text" class="input" id="mpFormAppId" placeholder="请输入AppID">
      </div>
      <div class="form-group">
        <label class="form-label"><span class="required">*</span>小程序类型</label>
        <select class="select" id="mpFormType" style="width:100%;">
          <option value="">请选择</option>
          <option value="微信小程序">微信小程序</option>
          <option value="支付宝小程序">支付宝小程序</option>
          <option value="抖音小程序">抖音小程序</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">描述</label>
        <textarea class="input textarea" id="mpFormDesc" placeholder="请输入描述（选填）" maxlength="200" style="width:100%;"></textarea>
      </div>
    </div>
    <div class="confirm-footer">
      <button class="btn" id="mpFormCancel">取消</button>
      <button class="btn btn-primary" id="mpFormSubmit">保存</button>
    </div>
  </div>
</div>

<!-- ====== 小程序详情弹窗 ====== -->
<div class="confirm-overlay" id="mpDetailModal" style="display:none;">
  <div class="confirm-box" style="width:640px;max-height:80vh;overflow-y:auto;">
    <div class="confirm-header">小程序详情</div>
    <div class="confirm-body" id="mpDetailContent">
      <!-- JS动态渲染 -->
    </div>
    <div class="confirm-footer">
      <button class="btn" id="mpDetailClose">关闭</button>
    </div>
  </div>
</div>

<!-- ====== 订阅操作记录弹窗 ====== -->
<div class="confirm-overlay" id="mpSubscribeLogModal" style="display:none;">
  <div class="confirm-box" style="width:560px;max-height:70vh;overflow-y:auto;">
    <div class="confirm-header">订阅开关操作记录</div>
    <div class="confirm-body" id="mpSubscribeLogContent">
      <!-- JS动态渲染 -->
    </div>
    <div class="confirm-footer">
      <button class="btn" id="mpSubscribeLogClose">关闭</button>
    </div>
  </div>
</div>
