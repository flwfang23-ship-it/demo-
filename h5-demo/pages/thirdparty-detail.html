<style>
  .tpa-detail-page { padding: 0; }
</style>

<div class="page-container tpa-detail-page">
  <div class="tpa-detail-header">
    <button class="tpa-detail-back" id="tpaDetailBack">&larr; 返回活动清单</button>
    <h2 class="tpa-detail-title" id="tpaDetailName">花小猪打车</h2>
  </div>

  <div class="tpa-detail-appid">
    <span class="tpa-appid-label">AppID：</span>
    <code class="tpa-appid-value" id="tpaDetailAppId">wx_hxz_2024_001</code>
    <button class="btn btn-sm btn-copy-appid" id="btnCopyAppId">📄 复制</button>
  </div>

  <!-- 路径配置卡片 -->
  <div class="tpa-config-card">
    <div class="tpa-card-header">
      <div class="tpa-card-title">
        <span class="tpa-card-icon">⚙</span>
        <span>推广路径配置</span>
      </div>
      <div class="tpa-card-toggle">
        <span class="tpa-switch-label" id="tpaSwitchLabel">统一路径</span>
        <label class="switch">
          <input type="checkbox" id="tpaUnifiedToggle">
          <span class="switch-slider"></span>
        </label>
      </div>
    </div>

    <div class="tpa-card-body">
      <div class="tpa-hint-text">开启后所有推广位使用同一个小程序路径，无需逐个配置</div>

      <!-- 统一路径模式 -->
      <div class="tpa-unified-view" id="tpaUnifiedBox" style="display:none;">
        <div class="tpa-input-wrapper">
          <input type="text" class="input-field" id="tpaUnifiedPath" placeholder="请输入统一的小程序路径">
          <button class="btn btn-primary" id="btnSaveUnified">保存路径</button>
        </div>
      </div>

      <!-- 按推广位模式：表格 -->
      <div id="tpaDetailTable">
        <table class="tpa-custom-table">
          <thead>
            <tr>
              <th style="width:20%;">推广位名称</th>
              <th style="width:70%;">小程序路径</th>
              <th style="width:10%;">操作</th>
            </tr>
          </thead>
          <tbody id="tpaPathBody"></tbody>
        </table>

        <div class="tpa-table-actions">
          <button class="btn btn-primary" id="btnSaveAll">一键保存全部</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
(function () {
  'use strict';

  var tpaId = null;
  var currentActivity = null;

  function init() {
    tpaId = sessionStorage.getItem('tpaDetailId');
    if (!tpaId) {
      window.showToast('未找到活动信息', 'error');
      return;
    }

    var tpaList = window.MockData.thirdPartyActivities || [];
    currentActivity = tpaList.find(function (a) { return a.id === tpaId; });
    if (!currentActivity) {
      window.showToast('活动不存在', 'error');
      return;
    }

    renderHeader();
    renderByMode();
    bindEvents();
  }

  function renderHeader() {
    document.getElementById('tpaDetailName').textContent = currentActivity.name;
    document.getElementById('tpaDetailAppId').textContent = currentActivity.appId;
  }

  function getUseUnified() {
    return !!(currentActivity.useUnifiedPath);
  }

  function renderByMode() {
    var useUnified = getUseUnified();
    document.getElementById('tpaUnifiedToggle').checked = useUnified;
    document.getElementById('tpaUnifiedBox').style.display = useUnified ? '' : 'none';
    document.getElementById('tpaDetailTable').style.display = useUnified ? 'none' : '';

    if (useUnified) {
      document.getElementById('tpaUnifiedPath').value = currentActivity.unifiedPath || '';
    } else {
      renderPathTable();
    }
  }

  function renderPathTable() {
    var tbody = document.getElementById('tpaPathBody');
    var promos = (window.MockData.getAllPromotions ? window.MockData.getAllPromotions() : (window.MockData.promotions || []));

    if (promos.length === 0) {
      tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;color:#909399;padding:40px;">暂无推广位数据</td></tr>';
      return;
    }

    tbody.innerHTML = promos.map(function (p) {
      var currentPath = (currentActivity.promoPaths && currentActivity.promoPaths[p.id]) || '';
      return '' +
        '<tr>' +
          '<td class="tpa-cell-name"><span class="tpa-dot">·</span> ' + p.name + '</td>' +
          '<td><input type="text" class="input-field" data-promo-id="' + p.id + '" value="' + escHtml(currentPath) + '" placeholder="请输入小程序路径"></td>' +
          '<td><button class="btn btn-primary btn-sm btn-save-path" data-promo-id="' + p.id + '">保存</button></td>' +
        '</tr>';
    }).join('');
  }

  function escHtml(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function bindEvents() {
    document.getElementById('tpaDetailBack').addEventListener('click', function () {
      window.AppNav.navigateTo('activity-list-other');
    });

    // 复制AppID
    document.getElementById('btnCopyAppId').addEventListener('click', function () {
      var appId = currentActivity.appId;
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(appId).then(function () {
          window.showToast('AppID 已复制', 'success');
        }).catch(function () {
          fallbackCopy(appId);
        });
      } else {
        fallbackCopy(appId);
      }
    });

    function fallbackCopy(text) {
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.left = '-9999px';
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); window.showToast('AppID 已复制', 'success'); } catch (e) { window.showToast('复制失败，请手动复制', 'error'); }
      document.body.removeChild(ta);
    }

    // 统一路径开关
    document.getElementById('tpaUnifiedToggle').addEventListener('change', function () {
      var wasUnified = getUseUnified();
      var willUnified = this.checked;

      if (wasUnified && !willUnified) {
        var unifiedPath = document.getElementById('tpaUnifiedPath').value.trim();
        if (unifiedPath) {
          var promos = (window.MockData.getAllPromotions ? window.MockData.getAllPromotions() : []);
          if (!currentActivity.promoPaths) currentActivity.promoPaths = {};
          promos.forEach(function (p) { currentActivity.promoPaths[p.id] = unifiedPath; });
        }
      } else if (!wasUnified && willUnified) {
        var paths = currentActivity.promoPaths || {};
        var existingPath = '';
        var keys = Object.keys(paths);
        for (var i = 0; i < keys.length; i++) {
          if (paths[keys[i]] && paths[keys[i]].trim()) {
            existingPath = paths[keys[i]].trim();
            break;
          }
        }
        currentActivity.unifiedPath = existingPath;
      }

      currentActivity.useUnifiedPath = willUnified;
      renderByMode();
    });

    // 统一路径保存
    document.getElementById('btnSaveUnified').addEventListener('click', function () {
      var path = document.getElementById('tpaUnifiedPath').value.trim();
      currentActivity.unifiedPath = path;
      window.showToast('统一路径保存成功', 'success');
    });

    // 行级保存
    document.getElementById('tpaPathBody').addEventListener('click', function (e) {
      var btn = e.target.closest('.btn-save-path');
      if (!btn) return;
      var promoId = btn.getAttribute('data-promo-id');
      var input = document.querySelector('.input-field[data-promo-id="' + promoId + '"]');
      if (!input) return;
      var path = input.value.trim();

      if (!currentActivity.promoPaths) currentActivity.promoPaths = {};
      currentActivity.promoPaths[promoId] = path;
      window.showToast('保存成功', 'success');
    });

    // 一键保存全部
    document.getElementById('btnSaveAll').addEventListener('click', function () {
      var inputs = document.querySelectorAll('#tpaPathBody .input-field');
      var savedCount = 0;
      if (!currentActivity.promoPaths) currentActivity.promoPaths = {};
      inputs.forEach(function (input) {
        var promoId = input.getAttribute('data-promo-id');
        currentActivity.promoPaths[promoId] = input.value.trim();
        savedCount++;
      });
      window.showToast('已保存 ' + savedCount + ' 条推广位路径', 'success');
    });
  }

  init();
})();
</script>
