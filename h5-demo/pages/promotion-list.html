<!-- C03 推广位管理 - 列表页 -->
<div class="page-container">

  <!-- 筛选区 -->
  <div class="promo-filter-bar">
    <div class="promo-filter-row">
      <div class="promo-filter-item">
        <label class="promo-filter-label">推广位ID</label>
        <input class="input" id="filterPromoId" placeholder="输入推广位ID">
      </div>
      <div class="promo-filter-item">
        <label class="promo-filter-label">推广位分组</label>
        <select class="input" id="filterGroupId">
          <option value="">全部分组</option>
          <!-- JS动态渲染 -->
        </select>
      </div>
      <div class="promo-filter-item">
        <label class="promo-filter-label">是否推广权益页</label>
        <select class="input" id="filterMiniProgram">
          <option value="">全部</option>
          <option value="1">是</option>
          <option value="0">否</option>
        </select>
      </div>
      <div class="promo-filter-actions">
        <button class="btn btn-default btn-sm" id="btnAddGroup">+ 新增分组</button>
        <button class="btn btn-primary btn-sm" id="btnAddPromo">+ 新增推广位</button>
      </div>
    </div>
  </div>

  <!-- 列表表格 -->
  <div class="table-wrapper card">
    <table>
      <thead>
        <tr>
          <th style="width:120px">推广位名称</th>
          <th style="width:105px">推广位ID</th>
          <th style="width:85px">所属分组</th>
          <th style="width:90px;text-align:center">推广状态</th>
          <th style="width:110px;text-align:center">待配置活动路径</th>
          <th style="width:160px">小程序推广路径</th>
          <th style="width:150px">H5路径</th>
          <th style="width:70px;text-align:center">取链清单</th>
          <th style="width:80px">操作</th>
        </tr>
      </thead>
      <tbody id="promoTableBody">
        <!-- JS动态渲染 -->
      </tbody>
    </table>
  </div>

  <!-- 分页 -->
  <div class="pagination" id="promoPagination"></div>

</div>

<!-- ====== 新增推广位分组弹窗 ====== -->
<div class="modal-overlay" id="groupFormOverlay" style="display:none">
  <div class="modal-box" style="width:420px">
    <div class="modal-header">
      <h3>新增推广位分组</h3>
      <button class="modal-close" id="btnGroupCancel">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label"><span class="required">*</span>分组名称</label>
        <input class="input" id="groupNameInput" placeholder="请输入分组名称" maxlength="10">
        <div class="form-error" id="groupFormError" style="display:none"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" id="btnGroupCancel2">取消</button>
      <button class="btn btn-primary" id="btnGroupCreate">创建</button>
    </div>
  </div>
</div>

<!-- ====== 编辑推广位 - 右侧抽屉 ====== -->
<div class="drawer-overlay" id="promoEditDrawerOverlay" style="display:none">
  <div class="drawer drawer--wide" id="promoEditDrawer">
    <div class="drawer-header">
      <h3 class="drawer-title" id="promoEditDrawerTitle">编辑推广位</h3>
      <button class="drawer-close" id="btnPromoDrawerClose">&times;</button>
    </div>
    <div class="drawer-body">
      <!-- Section 1: 基本信息 -->
      <div class="drawer-section">
        <div class="drawer-section-title">基本信息</div>
        <div class="form-group">
          <label class="form-label"><span class="required">*</span>推广位名称</label>
          <input class="input" id="drawerPromoName" placeholder="请输入推广位名称" maxlength="20">
          <div class="form-error" id="drawerPromoNameError" style="display:none"></div>
        </div>
        <div class="form-group">
          <label class="form-label">推广位ID</label>
          <div class="drawer-readonly-field">
            <code id="drawerPromoId" style="font-size:13px;background:#f5f5f5;padding:6px 10px;border-radius:4px;display:block;">—</code>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label"><span class="required">*</span>所属分组</label>
          <div class="promo-group-select-row">
            <select class="input" id="drawerPromoGroup" style="flex:1">
              <!-- JS动态渲染 -->
            </select>
            <button class="btn btn-link btn-sm" id="btnDrawerNewGroup" style="white-space:nowrap">+ 新建</button>
          </div>
          <div class="promo-group-input-row" id="drawerGroupInputRow" style="display:none">
            <input class="input" id="drawerNewGroupInput" placeholder="输入新分组名称" maxlength="10" style="flex:1">
            <button class="btn btn-primary btn-sm" id="btnDrawerConfirmGroup" style="white-space:nowrap">确认</button>
            <button class="btn btn-sm" id="btnDrawerCancelGroup" style="white-space:nowrap">取消</button>
          </div>
          <div class="form-error" id="drawerGroupError" style="display:none"></div>
        </div>
      </div>

      <!-- Section 2: 权益页推广 -->
      <div class="drawer-section">
        <div class="drawer-section-title">权益页推广</div>
        <div class="form-group">
          <label class="form-label">是否推广权益页</label>
          <label class="switch" style="display:inline-flex">
            <input type="checkbox" id="drawerBenefitEnabled">
            <span class="switch-slider"></span>
          </label>
          <span class="form-hint" style="margin-left:8px;" id="drawerBenefitHint">关闭后列表中显示"未开启"</span>
        </div>

        <!-- 以下全部随开关联动 -->
        <div id="drawerBenefitAll" style="display:none">
          <div class="form-group">
            <label class="form-label">小程序推广路径</label>
            <div class="drawer-path-input-row">
              <input class="input" id="drawerMiniPath" placeholder="输入小程序页面路径">
              <button class="btn btn-sm btn-copy-path drawer-copy-btn" id="btnCopyDrawerMini" title="复制">&#x2398;</button>
              <button class="btn btn-sm btn-link" id="btnDrawerMpList" style="white-space:nowrap">查看小程序清单</button>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">H5推广路径</label>
            <div class="drawer-path-input-row">
              <input class="input" id="drawerH5Path" placeholder="输入H5链接地址">
              <button class="btn btn-sm btn-copy-path drawer-copy-btn" id="btnCopyDrawerH5" title="复制">&#x2398;</button>
            </div>
          </div>

          <!-- 活动Tab切换 -->
          <div class="drawer-sub-section">
            <div class="drawer-tabs">
              <button class="drawer-tab active" data-tab="alliance">联盟推广</button>
              <button class="drawer-tab" data-tab="embedH5">内嵌H5</button>
              <button class="drawer-tab" data-tab="thirdParty">第三方活动<span class="tab-badge" id="thirdPartyBadge" style="display:none"></span></button>
            </div>

            <!-- Tab: 联盟推广 -->
            <div class="drawer-tab-panel active" id="tabPanelAlliance">
              <div class="path-drawer-table-wrap">
                <table class="path-drawer-table">
                  <thead>
                    <tr>
                      <th style="width:60px">平台</th>
                      <th style="width:100px">活动名称</th>
                      <th style="width:120px">APPID</th>
                      <th>路径</th>
                      <th style="width:90px">状态</th>
                    </tr>
                  </thead>
                  <tbody id="drawerAllianceTbody"></tbody>
                </table>
              </div>
            </div>

            <!-- Tab: 内嵌H5 -->
            <div class="drawer-tab-panel" id="tabPanelEmbedH5" style="display:none">
              <div class="path-drawer-table-wrap">
                <table class="path-drawer-table">
                  <thead>
                    <tr>
                      <th style="width:60px">平台</th>
                      <th style="width:100px">活动名称</th>
                      <th style="width:100px">口令</th>
                      <th>路径</th>
                      <th style="width:120px">状态</th>
                    </tr>
                  </thead>
                  <tbody id="drawerEmbedH5Tbody"></tbody>
                </table>
              </div>
            </div>

            <!-- Tab: 第三方活动 -->
            <div class="drawer-tab-panel" id="tabPanelThirdParty" style="display:none">
              <div class="path-drawer-table-wrap">
                <table class="path-drawer-table">
                  <thead>
                    <tr>
                      <th style="width:60px">平台</th>
                      <th style="width:100px">活动名称</th>
                      <th style="width:120px">APPID</th>
                      <th>小程序路径</th>
                      <th style="width:90px">状态</th>
                    </tr>
                  </thead>
                  <tbody id="drawerPathTbody"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="drawer-footer">
      <button class="btn btn-primary drawer-btn-main" id="btnDrawerSave">保存</button>
      <button class="btn drawer-btn-cancel" id="btnDrawerCancel">取消</button>
    </div>
  </div>
</div>

<!-- ====== 取链清单 - 全屏 ====== -->
<div class="chain-fullscreen-overlay" id="chainListOverlay" style="display:none">
  <div class="chain-fullscreen">
    <div class="chain-fullscreen-header">
      <h2 id="chainListTitle">取链清单</h2>
      <div class="chain-info-bar" id="chainInfoBar"></div>
      <button class="modal-close" id="btnChainListClose" style="position:absolute;top:20px;right:24px;font-size:28px" onclick="window.__closeChainListModal()">&times;</button>
    </div>
    <div class="chain-toolbar">
      <div class="chain-tabs" id="chainTabs">
        <button class="chain-tab active" data-platform="all">全部</button>
        <button class="chain-tab" data-platform="美团">美团联盟</button>
        <button class="chain-tab" data-platform="饿了么">饿了么联盟</button>
        <button class="chain-tab" data-platform="其他">其他</button>
      </div>
      <div class="chain-search">
        <input class="input" id="chainSearchInput" placeholder="搜索活动名称或ID..." style="width:200px">
        <button class="btn btn-primary btn-sm" id="btnOpenChainAdd" style="margin-left:8px" onclick="window.__openChainAddModal()">+ 新增链接</button>
      </div>
    </div>
    <div class="chain-fullscreen-body">
      <table class="chain-table">
        <thead>
          <tr>
            <th style="width:100px">平台</th>
            <th style="width:180px">活动名称</th>
            <th>短链接</th>
            <th style="width:140px">操作</th>
          </tr>
        </thead>
        <tbody id="chainTableBody">
          <!-- JS动态渲染 -->
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- ====== 新增链接弹窗 ====== -->
<div class="modal-overlay" id="chainAddOverlay" style="display:none;z-index:1200">
  <div class="modal-box" style="width:520px">
    <div class="modal-header">
      <h3>新增链接</h3>
      <button class="modal-close" id="btnChainAddClose" onclick="window.__closeChainAddModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="chain-add-header" id="chainAddHeader">
        <span class="chain-add-header-col" style="width:120px">平台</span>
        <span class="chain-add-header-col" style="width:140px">活动</span>
        <span class="chain-add-header-col" style="width:100px">操作</span>
      </div>
      <div class="chain-add-rows" id="chainAddRows">
        <!-- JS动态渲染 -->
      </div>
      <button class="btn btn-link btn-sm" id="btnChainAddRow" style="margin-top:8px" onclick="window.__addChainRow()">+ 添加一行</button>
    </div>
    <div class="modal-footer">
      <button class="btn" id="btnChainCancelAdd" onclick="window.__closeChainAddModal()">取消</button>
      <button class="btn btn-primary" id="btnChainBatchAdd" onclick="window.__batchAddChainItems()">批量添加</button>
    </div>
  </div>
</div>

<!-- ====== 小程序清单弹窗（卡片布局） ====== -->
<div class="modal-overlay" id="mpListOverlay" style="display:none">
  <div class="modal-box" style="width:720px">
    <div class="modal-header">
      <h3 id="mpListTitle">小程序清单</h3>
      <button class="modal-close" id="btnMpListClose">&times;</button>
    </div>
    <div class="modal-body" style="max-height:560px;overflow-y:auto">
      <div class="mp-card-list" id="mpCardList">
        <!-- JS动态渲染 -->
      </div>
      <div class="empty-state" id="mpListEmpty" style="display:none;padding:40px">
        <div class="empty-state-text">暂无关联小程序</div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" id="btnMpListCancel">关闭</button>
    </div>
  </div>
</div>
