<style>
  .act-list-container { padding: 0; }
  .act-list-empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--color-text-tertiary);
  }
  .act-list-empty-icon { font-size: 48px; margin-bottom: var(--spacing-md); opacity: 0.5; }
  .btn-add-tpa {
    padding: 6px 16px;
    background: var(--color-primary);
    color: #fff;
    border: none;
    border-radius: var(--radius-md);
    font-size: 13px;
    cursor: pointer;
    transition: all var(--transition-fast);
  }
  .btn-add-tpa:hover { filter: brightness(1.1); }
  .act-search-input { width: 220px !important; }

  /* 删除引导跳转权益页弹窗 */
  .tpa-redirect-box { max-width: 480px; }
  .tpa-redirect-config-list { margin-top: 8px; }
  .tpa-redirect-config-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: #FFF7E6;
    border-radius: var(--radius-md);
    font-size: 13px;
    color: var(--color-text-secondary);
  }
  .tpa-redirect-badge {
    display: inline-block;
    padding: 2px 8px;
    background: #FA8C16;
    color: #fff;
    font-size: 11px;
    border-radius: var(--radius-sm);
    white-space: nowrap;
  }

  /* TPA路径配置抽屉 */
  .tpa-drawer-appid {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 0;
    font-size: 13px;
    color: var(--color-text-secondary);
  }
  .tpa-drawer-appid code {
    padding: 2px 8px;
    background: #F5F5F5;
    border-radius: var(--radius-sm);
    font-size: 12px;
    color: var(--color-text-primary);
  }
  .tpa-drawer-card {
    margin-top: var(--spacing-md);
    border: 1px solid var(--color-border-light);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }
  .tpa-drawer-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: #FAFAFA;
    font-size: 14px;
    font-weight: 600;
    color: var(--color-text-primary);
    border-bottom: 1px solid var(--color-border-light);
  }
  .tpa-drawer-card-body {
    padding: 16px;
  }
  .tpa-drawer-hint {
    font-size: 12px;
    color: var(--color-text-tertiary);
    margin-bottom: 12px;
  }
  .tpa-drawer-input-row {
    display: flex;
    gap: 8px;
  }
  .tpa-drawer-input-row .input {
    flex: 1;
  }
  .tpa-drawer-table-wrap {
    max-height: 360px;
    overflow-y: auto;
    border: 1px solid var(--color-border-light);
    border-radius: var(--radius-md);
  }
  .tpa-drawer-table-actions {
    margin-top: 12px;
  }
</style>

<div class="page-container act-list-container">
  <div class="page-header">
    <h2>活动清单</h2>
  </div>

  <!-- 顶部Tab + 搜索 -->
  <div class="act-list-toolbar">
    <div class="act-tabs" id="actTabs">
      <div class="act-tab-item active" data-tab="all">全部</div>
      <div class="act-tab-item" data-tab="meituan">美团联盟</div>
      <div class="act-tab-item" data-tab="eleme">饿了么联盟</div>
      <div class="act-tab-item" data-tab="jd">京东<span class="external-link-tag">外部链接</span></div>
      <div class="act-tab-item" data-tab="taxi">打车<span class="external-link-tag">外部链接</span></div>
      <div class="act-tab-item" data-tab="other">其他<span class="external-link-tag">第三方链接</span></div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <div class="act-tab-actions" id="tpaAddBtn" style="display:none;">
        <button class="btn-add-tpa" id="btnAddTpa">+ 新增活动</button>
      </div>
      <div class="act-search">
        <input class="input act-search-input" id="actSearchInput" placeholder="搜索活动名称...">
        <button class="btn btn-primary btn-sm" id="btnActSearch">查询</button>
      </div>
    </div>
  </div>

  <!-- 活动列表容器 -->
  <div id="actListBody"></div>

  <!-- 分页 -->
  <div class="pagination" id="actPagination"></div>
</div>

<!-- 新增第三方活动弹窗 -->
<div class="modal-overlay" id="tpaFormModal" style="display:none;">
  <div class="modal-box">
    <div class="modal-header">
      <h3>新增第三方活动</h3>
      <button class="modal-close" id="tpaFormClose">&times;</button>
    </div>
    <div class="modal-body">
      <div class="tpa-form-group">
        <label>* 平台</label>
        <input type="text" id="tpaPlatform" placeholder="如：花小猪、滴滴">
      </div>
      <div class="tpa-form-group">
        <label>* 活动名称</label>
        <input type="text" id="tpaName" placeholder="请输入活动名称">
      </div>
      <div class="tpa-form-group">
        <label>* AppID</label>
        <input type="text" id="tpaAppId" placeholder="请输入AppID">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-default" id="tpaFormCancel">取消</button>
      <button class="btn btn-primary" id="tpaFormSubmit">创建</button>
    </div>
  </div>
</div>

<!-- TPA路径配置抽屉 -->
<div class="drawer-overlay" id="tpaPathDrawerOverlay" style="display:none;">
  <div class="drawer" id="tpaPathDrawer">
    <div class="drawer-header">
      <h3 class="drawer-title">配置推广位路径</h3>
      <button class="drawer-close" id="tpaPathDrawerClose">&times;</button>
    </div>
    <div class="drawer-body">
      <div class="drawer-activity-info">
        <div class="drawer-activity-tags">
          <span class="tpa-platform-tag" id="tpaDrawerPlatform">--</span>
          <span class="drawer-activity-name" id="tpaDrawerName">--</span>
        </div>
      </div>
      <div class="tpa-drawer-appid">
        <span>AppID：</span>
        <code id="tpaDrawerAppId">--</code>
        <button class="btn btn-sm" id="tpaDrawerCopyAppId">复制</button>
      </div>

      <div class="tpa-drawer-card">
        <div class="tpa-drawer-card-header">
          <span>推广路径配置</span>
          <div style="display:flex;align-items:center;gap:8px;">
            <span style="font-size:12px;font-weight:400;color:var(--color-text-secondary);">统一路径</span>
            <label class="switch">
              <input type="checkbox" id="tpaDrawerUnifiedToggle">
              <span class="switch-slider"></span>
            </label>
          </div>
        </div>
        <div class="tpa-drawer-card-body">
          <div class="tpa-drawer-hint">开启后所有推广位使用同一个小程序路径，无需逐个配置</div>

          <div id="tpaDrawerUnifiedBox" style="display:none;">
            <div class="tpa-drawer-input-row">
              <input type="text" class="input" id="tpaDrawerUnifiedPath" placeholder="请输入统一的小程序路径">
              <button class="btn btn-primary" id="tpaDrawerSaveUnified">保存路径</button>
            </div>
          </div>

          <div id="tpaDrawerTableBox">
            <div class="tpa-drawer-table-wrap">
              <table class="path-drawer-table">
                <thead>
                  <tr>
                    <th style="width:25%;">推广位名称</th>
                    <th style="width:60%;">小程序路径</th>
                    <th style="width:15%;">操作</th>
                  </tr>
                </thead>
                <tbody id="tpaDrawerPathBody"></tbody>
              </table>
            </div>
            <div class="tpa-drawer-table-actions">
              <button class="btn btn-primary" id="tpaDrawerSaveAll">一键保存全部</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
(function () {
  'use strict';

  var currentTab = 'all';
  var searchKeyword = '';
  var page = 1;
  var pageSize = 10;

  var tabs = [
    { key: 'all', label: '全部' },
    { key: 'meituan', label: '美团联盟' },
    { key: 'eleme', label: '饿了么联盟' },
    { key: 'jd', label: '京东' },
    { key: 'taxi', label: '打车' },
    { key: 'other', label: '其他' }
  ];

  function getRegularActivities() {
    return window.MockData.availableActivities || [];
  }

  function getTpaList() {
    return window.MockData.thirdPartyActivities || [];
  }

  // 判断活动状态
  function getActivityStatus(act) {
    if (!act.endDate) return { cls: '', label: '' };
    var today = new Date();
    today.setHours(0, 0, 0, 0);
    var end = new Date(act.endDate);
    end.setHours(0, 0, 0, 0);
    if (end > today) return { cls: 'status-active', label: '进行中' };
    return { cls: 'status-ended', label: '已结束' };
  }

  // 过滤后的数据
  function getFilteredData() {
    var regular = getRegularActivities();
    var tpa = getTpaList();

    // 按Tab过滤
    if (currentTab === 'meituan') {
      regular = regular.filter(function (a) { return a.supplier === 'meituan'; });
      tpa = [];
    } else if (currentTab === 'eleme') {
      regular = regular.filter(function (a) { return a.supplier === 'eleme'; });
      tpa = [];
    } else if (currentTab === 'jd') {
      tpa = regular.filter(function (a) { return a.supplier === 'jd'; });
      regular = [];
    } else if (currentTab === 'taxi') {
      tpa = regular.filter(function (a) { return a.supplier === 'taxi'; });
      regular = [];
    } else if (currentTab === 'other') {
      regular = [];
    }

    // 搜索过滤
    if (searchKeyword) {
      var kw = searchKeyword.toLowerCase();
      regular = regular.filter(function (a) { return a.name.toLowerCase().indexOf(kw) !== -1; });
      tpa = tpa.filter(function (a) { return a.name.toLowerCase().indexOf(kw) !== -1 || a.platform.toLowerCase().indexOf(kw) !== -1; });
    }

    return { regular: regular, tpa: tpa };
  }

  function renderTabs() {
    var tabsEl = document.getElementById('actTabs');
    tabsEl.querySelectorAll('.act-tab-item').forEach(function (t) {
      var isExternal = t.classList.contains('act-tab-external');
      t.classList.toggle('active', !isExternal && t.getAttribute('data-tab') === currentTab);
    });
    // 显示/隐藏新增第三方活动按钮
    document.getElementById('tpaAddBtn').style.display = currentTab === 'other' ? '' : 'none';
  }

  function renderList() {
    var body = document.getElementById('actListBody');
    var data = getFilteredData();

    // 合并全部数据再分页：regular 在前，tpa 在后
    var allItems = [];
    data.regular.forEach(function (item) { allItems.push({ type: 'regular', data: item }); });
    data.tpa.forEach(function (item) { allItems.push({ type: 'tpa', data: item }); });

    var totalItems = allItems.length;
    var totalPages = Math.max(1, Math.ceil(totalItems / pageSize));
    if (page > totalPages) page = totalPages;

    var start = (page - 1) * pageSize;
    var pageItems = allItems.slice(start, start + pageSize);

    if (pageItems.length === 0) {
      body.innerHTML = '<div class="act-list-empty"><div class="act-list-empty-icon">📋</div><div>暂无活动</div></div>';
      renderPagination(0, totalPages);
      return;
    }

    var html = '';
    var lastType = null;

    pageItems.forEach(function (item) {
      if (currentTab === 'all' && item.type !== lastType) {
        if (item.type === 'tpa') {
          html += '<div class="act-section-title">第三方活动</div>';
        }
      }
      lastType = item.type;

      if (item.type === 'regular') {
        html += renderRegularItem(item.data);
      } else {
        html += renderTpaItem(item.data);
      }
    });

    body.innerHTML = html;
    bindItemEvents();
    renderPagination(totalItems, totalPages);
  }

  function renderRegularItem(a) {
    var status = getActivityStatus(a);
    var statusHtml = status.label ? '<span class="act-status ' + status.cls + '">' + status.label + '</span>' : '';
    var bannerHtml = a.image
      ? '<img src="' + a.image + '" alt="' + a.name + '">'
      : '<span>活动Banner</span>';
    var subtitleHtml = a.subtitle || '';
    var venueHtml = a.venueId ? '会场ID：' + a.venueId : '';
    var startHtml = a.startDate ? '<div>开始：' + a.startDate + '</div>' : '';
    var endHtml = a.endDate ? '<div>截止：' + a.endDate + '</div>' : '';
    var commHtml = a.commission ? a.commission : '--';
    var supplierCls = a.supplier;
    var isPreset = !!a.isPreset;
    var presetChecked = isPreset ? ' checked' : '';

    return '' +
      '<div class="act-list-item' + (isPreset ? ' act-preset' : '') + '" data-act-id="' + a.id + '">' +
        '<div class="act-list-banner">' + bannerHtml + '</div>' +
        '<div class="act-list-info">' +
          '<div class="act-title-row">' +
            '<span class="act-title">' + a.name + '</span>' +
            statusHtml +
            '<span class="supplier-tag ' + supplierCls + '">' + a.supplierLabel + '</span>' +
          '</div>' +
          (subtitleHtml ? '<div class="act-subtitle">' + subtitleHtml + '</div>' : '') +
          (venueHtml ? '<div class="act-venue">' + venueHtml + '</div>' : '') +
        '</div>' +
        '<div class="act-list-time">' +
          startHtml +
          endHtml +
        '</div>' +
        '<div class="act-list-commission">' +
          '<div>预估佣金</div>' +
          '<div class="comm-value">' + commHtml + '</div>' +
        '</div>' +
        '<div class="act-list-actions">' +
          '<div class="act-preset-toggle">' +
            '<label class="switch switch-sm">' +
              '<input type="checkbox" class="act-preset-checkbox" data-act-id="' + a.id + '"' + presetChecked + '>' +
              '<span class="switch-slider"></span>' +
            '</label>' +
            '<span class="act-preset-label">' + (isPreset ? '已预设' : '预设活动') + '</span>' +
          '</div>' +
          '<button class="btn-promote-sm" data-activity=\'' + JSON.stringify({ id: a.id, name: a.name, supplier: a.supplierLabel, supplierKey: a.supplier, subtitle: a.subtitle || '', commission: a.commission || '详询' }).replace(/'/g, '&#39;') + '\'>立即推广</button>' +
          '<a href="javascript:;" class="link-rule" data-venue="' + (a.venueId || '') + '">会场推广规则 &gt;</a>' +
        '</div>' +
      '</div>';
  }

  function renderTpaItem(a) {
    var platformLabel = a.platformLabel || a.supplierLabel || a.platform || '';
    var hasAppId = a.appId && a.appId.trim() !== '';
    var subtitleHtml = hasAppId
      ? '<div class="tpa-appid">AppID：' + a.appId + '</div>'
      : (a.subtitle ? '<div class="tpa-appid">' + a.subtitle + '</div>' : '');
    var delHtml = (a.isPreset || !hasAppId) ? '' : '<button class="tpa-delete" data-tpa-id="' + a.id + '">删除</button>';
    var inUseHtml = (hasAppId && hasBenefitConfig(a)) ? '<span class="tpa-inuse-tag">使用中</span>' : '';
    return '' +
      '<div class="tpa-list-item" data-tpa-id="' + a.id + '">' +
        '<span class="tpa-platform-tag">' + platformLabel + '</span>' +
        '<div class="tpa-info">' +
          '<div class="tpa-name">' + a.name + inUseHtml + '</div>' +
          subtitleHtml +
        '</div>' +
        '<span class="tpa-arrow">配置推广位路径 &gt;</span>' +
        delHtml +
      '</div>';
  }

  function bindItemEvents() {
    // 普通活动 - 立即推广按钮
    document.querySelectorAll('.btn-promote-sm').forEach(function (btn) {
      btn.addEventListener('click', function (e) {
        e.stopPropagation();
        var info = JSON.parse(this.getAttribute('data-activity'));
        if (typeof openPromoteDrawer === 'function') {
          openPromoteDrawer(info);
        }
      });
    });

    // 普通活动 - 会场推广规则
    document.querySelectorAll('.link-rule').forEach(function (link) {
      link.addEventListener('click', function (e) {
        e.stopPropagation();
        var venueId = this.getAttribute('data-venue') || '暂无';
        window.showToast('会场推广规则：请参考平台活动推广规范（会场ID：' + venueId + '）', 'info');
      });
    });

    // 第三方活动 - 点击打开路径配置抽屉
    document.querySelectorAll('.tpa-list-item').forEach(function (item) {
      item.addEventListener('click', function () {
        var tpaId = this.getAttribute('data-tpa-id');
        openTpaPathDrawer(tpaId);
      });
    });

    // 预设活动 - 开关切换
    document.querySelectorAll('.act-preset-checkbox').forEach(function (cb) {
      cb.addEventListener('change', function (e) {
        e.stopPropagation();
        var actId = this.getAttribute('data-act-id');
        var checked = this.checked;
        togglePresetActivity(actId, checked);
      });
    });

    // 第三方活动 - 删除按钮
    document.querySelectorAll('.tpa-delete').forEach(function (btn) {
      btn.addEventListener('click', function (e) {
        e.stopPropagation();
        var tpaId = this.getAttribute('data-tpa-id');
        confirmDeleteTpa(tpaId);
      });
    });
  }

  // 预设活动开关
  function togglePresetActivity(actId, isPreset) {
    var activities = getRegularActivities();
    var act = activities.find(function (a) { return a.id === actId; });
    if (!act) return;
    act.isPreset = isPreset;
    var label = isPreset ? '已设为预设活动' : '已取消预设';
    window.showToast('「' + act.name + '」' + label, 'success');
    // 刷新当前项的预设标签显示
    renderList();
  }

  // 检查活动是否在权益页有配置（统一路径有值 或 promoPaths 中有任意非空值）
  function hasBenefitConfig(act) {
    if (act.unifiedPath && act.unifiedPath.trim() !== '') return true;
    var paths = act.promoPaths || {};
    var keys = Object.keys(paths);
    for (var i = 0; i < keys.length; i++) {
      if (paths[keys[i]] && paths[keys[i]].trim() !== '') return true;
    }
    return false;
  }

  // 自定义确认弹窗（用于二次确认删除）
  function showTpaConfirm(title, msg, onConfirm) {
    var overlay = document.createElement('div');
    overlay.className = 'confirm-overlay';
    overlay.innerHTML =
      '<div class="confirm-box">' +
      '<div class="confirm-header">' + title + '</div>' +
      '<div class="confirm-body" style="white-space:pre-line">' + msg + '</div>' +
      '<div class="confirm-footer">' +
      '<button class="btn btn-cancel-confirm">取消</button>' +
      '<button class="btn btn-danger btn-ok-confirm">确认删除</button>' +
      '</div>' +
      '</div>';

    document.body.appendChild(overlay);

    overlay.querySelector('.btn-cancel-confirm').onclick = function () { overlay.remove(); };
    overlay.querySelector('.btn-ok-confirm').onclick = function () { overlay.remove(); if (onConfirm) onConfirm(); };
    overlay.onclick = function (e) { if (e.target === overlay) overlay.remove(); };
  }

  function confirmDeleteTpa(tpaId) {
    var tpaList = getTpaList();
    var act = tpaList.find(function (a) { return a.id === tpaId; });
    if (!act) return;
    if (act.isPreset) {
      window.showToast('预设活动不可删除', 'error');
      return;
    }

    // 校验权益页是否有配置该活动
    if (hasBenefitConfig(act)) {
      showRedirectToBenefit(act);
    } else {
      showTpaConfirm(
        '确认删除',
        '确定要删除第三方活动「' + act.name + '」吗？\n删除后不可恢复。',
        function () {
          window.MockData.thirdPartyActivities = tpaList.filter(function (a) { return a.id !== tpaId; });
          window.showToast('已删除「' + act.name + '」', 'success');
          renderList();
        }
      );
    }
  }

  // 引导跳转权益页弹窗
  function showRedirectToBenefit(act) {
    var overlay = document.createElement('div');
    overlay.className = 'confirm-overlay';
    overlay.innerHTML =
      '<div class="confirm-box tpa-redirect-box">' +
      '<div class="confirm-header">无法删除</div>' +
      '<div class="confirm-body">' +
        '<p style="margin-bottom:12px;">活动「<strong>' + act.name + '</strong>」已在权益页中配置，请先前往权益页取消该活动的配置后再删除。</p>' +
        '<div class="tpa-redirect-config-list">' +
          (act.useUnifiedPath
            ? '<div class="tpa-redirect-config-item"><span class="tpa-redirect-badge">统一路径</span><span>已配置统一小程序路径</span></div>'
            : '<div class="tpa-redirect-config-item"><span class="tpa-redirect-badge">已配置</span><span>共 ' + Object.values(act.promoPaths || {}).filter(function(v) { return v && v.trim(); }).length + ' 个推广位配置了路径</span></div>'
          ) +
        '</div>' +
      '</div>' +
      '<div class="confirm-footer">' +
      '<button class="btn btn-default btn-cancel-redirect">取消</button>' +
      '<button class="btn btn-primary btn-goto-benefit">前往权益页配置</button>' +
      '</div>' +
      '</div>';

    document.body.appendChild(overlay);

    overlay.querySelector('.btn-cancel-redirect').onclick = function () { overlay.remove(); };
    overlay.querySelector('.btn-goto-benefit').onclick = function () {
      overlay.remove();
      window.AppNav.navigateTo('benefit-config');
    };
    overlay.onclick = function (e) { if (e.target === overlay) overlay.remove(); };
  }

  function renderPagination(totalItems, totalPages) {
    var el = document.getElementById('actPagination');
    if (totalPages <= 1) {
      el.innerHTML = '<span class="page-info">共 ' + totalItems + ' 条</span>';
      return;
    }
    var html = '<span class="page-info">共 ' + totalItems + ' 条</span>';
    html += '<button class="page-btn"' + (page <= 1 ? ' disabled' : '') + ' data-page="' + (page - 1) + '">上一页</button>';
    for (var i = 1; i <= totalPages; i++) {
      html += '<button class="page-btn' + (i === page ? ' active' : '') + '" data-page="' + i + '">' + i + '</button>';
    }
    html += '<button class="page-btn"' + (page >= totalPages ? ' disabled' : '') + ' data-page="' + (page + 1) + '">下一页</button>';
    el.innerHTML = html;

    el.querySelectorAll('.page-btn').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var p = parseInt(this.getAttribute('data-page'));
        if (p >= 1 && p <= totalPages) { page = p; renderList(); }
      });
    });
  }

  // Tab切换
  function initTabs() {
    document.getElementById('actTabs').addEventListener('click', function (e) {
      var tab = e.target.closest('.act-tab-item');
      if (!tab) return;

      currentTab = tab.getAttribute('data-tab');
      page = 1;
      searchKeyword = '';
      document.getElementById('actSearchInput').value = '';
      renderTabs();
      renderList();
    });
  }

  // 搜索
  function initSearch() {
    document.getElementById('btnActSearch').addEventListener('click', function () {
      searchKeyword = document.getElementById('actSearchInput').value.trim();
      page = 1;
      renderList();
    });
    document.getElementById('actSearchInput').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') { document.getElementById('btnActSearch').click(); }
    });
  }

  // 新增第三方活动弹窗
  function initTpaForm() {
    var modal = document.getElementById('tpaFormModal');

    document.getElementById('btnAddTpa').addEventListener('click', function () {
      document.getElementById('tpaPlatform').value = '';
      document.getElementById('tpaName').value = '';
      document.getElementById('tpaAppId').value = '';
      modal.style.display = 'flex';
    });

    document.getElementById('tpaFormClose').onclick = function () { closeModalAnimated(modal); };
    document.getElementById('tpaFormCancel').onclick = function () { closeModalAnimated(modal); };
    modal.onclick = function (e) { if (e.target === modal) closeModalAnimated(modal); };

    document.getElementById('tpaFormSubmit').addEventListener('click', function () {
      var platform = document.getElementById('tpaPlatform').value.trim();
      var name = document.getElementById('tpaName').value.trim();
      var appId = document.getElementById('tpaAppId').value.trim();

      if (!platform) { window.showToast('请输入平台名称', 'error'); return; }
      if (!name) { window.showToast('请输入活动名称', 'error'); return; }
      if (!appId) { window.showToast('请输入AppID', 'error'); return; }

      var tpaList = getTpaList();
      var dup = tpaList.find(function (a) { return a.platform === platform && a.name === name; });
      if (dup) { window.showToast('该平台下已存在同名活动', 'error'); return; }

      var newId = 'TPA_' + String(tpaList.length + 1).padStart(3, '0');
      var promos = (window.MockData.getAllPromotions ? window.MockData.getAllPromotions() : (window.MockData.promotions || []));
      var promoPaths = {};
      promos.forEach(function (p) { promoPaths[p.id] = ''; });

      var newTpa = {
        id: newId,
        platform: platform,
        name: name,
        appId: appId,
        isPreset: false,
        useUnifiedPath: false,
        unifiedPath: '',
        promoPaths: promoPaths
      };

      window.MockData.thirdPartyActivities.push(newTpa);
      closeModalAnimated(modal);
      window.showToast('第三方活动「' + name + '」创建成功', 'success');
      renderList();
    });
  }

  // TPA路径配置抽屉
  var tpaDrawerAct = null;

  function openTpaPathDrawer(tpaId) {
    var tpaList = getTpaList();
    tpaDrawerAct = tpaList.find(function (a) { return a.id === tpaId; });
    if (!tpaDrawerAct) { window.showToast('活动不存在', 'error'); return; }

    document.getElementById('tpaDrawerPlatform').textContent = tpaDrawerAct.platform;
    document.getElementById('tpaDrawerName').textContent = tpaDrawerAct.name;
    document.getElementById('tpaDrawerAppId').textContent = tpaDrawerAct.appId;

    renderTpaDrawerByMode();
    openModalAnimated(document.getElementById('tpaPathDrawerOverlay'));
  }

  function closeTpaPathDrawer() {
    closeModalAnimated(document.getElementById('tpaPathDrawerOverlay'));
  }

  function renderTpaDrawerByMode() {
    var useUnified = !!(tpaDrawerAct.useUnifiedPath);
    document.getElementById('tpaDrawerUnifiedToggle').checked = useUnified;
    document.getElementById('tpaDrawerUnifiedBox').style.display = useUnified ? '' : 'none';
    document.getElementById('tpaDrawerTableBox').style.display = useUnified ? 'none' : '';

    if (useUnified) {
      document.getElementById('tpaDrawerUnifiedPath').value = tpaDrawerAct.unifiedPath || '';
    } else {
      renderTpaDrawerPathTable();
    }
  }

  function renderTpaDrawerPathTable() {
    var tbody = document.getElementById('tpaDrawerPathBody');
    var promos = (window.MockData.getAllPromotions ? window.MockData.getAllPromotions() : (window.MockData.promotions || []));

    if (promos.length === 0) {
      tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;color:#909399;padding:40px;">暂无推广位数据</td></tr>';
      return;
    }

    tbody.innerHTML = promos.map(function (p) {
      var currentPath = (tpaDrawerAct.promoPaths && tpaDrawerAct.promoPaths[p.id]) || '';
      return '' +
        '<tr>' +
          '<td style="font-size:13px;color:var(--color-text-primary);">' + escHtmlTpa(p.name) + '</td>' +
          '<td><input type="text" class="path-drawer-input' + (currentPath ? '' : ' is-empty') + '" data-promo-id="' + p.id + '" value="' + escHtmlTpa(currentPath) + '" placeholder="请输入小程序路径"></td>' +
          '<td><button class="btn btn-primary btn-sm btn-tpa-drawer-save" data-promo-id="' + p.id + '">保存</button></td>' +
        '</tr>';
    }).join('');
  }

  function escHtmlTpa(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function initTpaPathDrawer() {
    var overlay = document.getElementById('tpaPathDrawerOverlay');

    document.getElementById('tpaPathDrawerClose').addEventListener('click', closeTpaPathDrawer);
    overlay.addEventListener('click', function (e) { if (e.target === overlay) closeTpaPathDrawer(); });

    // 复制AppID
    document.getElementById('tpaDrawerCopyAppId').addEventListener('click', function () {
      var appId = tpaDrawerAct ? tpaDrawerAct.appId : '';
      if (!appId) return;
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(appId).then(function () {
          window.showToast('AppID 已复制', 'success');
        }).catch(function () {
          fallbackCopyTpa(appId);
        });
      } else {
        fallbackCopyTpa(appId);
      }
    });

    function fallbackCopyTpa(text) {
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.left = '-9999px';
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); window.showToast('AppID 已复制', 'success'); } catch (e) { window.showToast('复制失败，请手动复制', 'error'); }
      document.body.removeChild(ta);
    }

    // 统一路径开关
    document.getElementById('tpaDrawerUnifiedToggle').addEventListener('change', function () {
      var wasUnified = !!(tpaDrawerAct.useUnifiedPath);
      var willUnified = this.checked;

      if (wasUnified && !willUnified) {
        var unifiedPath = document.getElementById('tpaDrawerUnifiedPath').value.trim();
        if (unifiedPath) {
          var promos = (window.MockData.getAllPromotions ? window.MockData.getAllPromotions() : []);
          if (!tpaDrawerAct.promoPaths) tpaDrawerAct.promoPaths = {};
          promos.forEach(function (p) { tpaDrawerAct.promoPaths[p.id] = unifiedPath; });
        }
      } else if (!wasUnified && willUnified) {
        var paths = tpaDrawerAct.promoPaths || {};
        var existingPath = '';
        var keys = Object.keys(paths);
        for (var i = 0; i < keys.length; i++) {
          if (paths[keys[i]] && paths[keys[i]].trim()) {
            existingPath = paths[keys[i]].trim();
            break;
          }
        }
        tpaDrawerAct.unifiedPath = existingPath;
      }

      tpaDrawerAct.useUnifiedPath = willUnified;
      renderTpaDrawerByMode();
    });

    // 统一路径保存
    document.getElementById('tpaDrawerSaveUnified').addEventListener('click', function () {
      var path = document.getElementById('tpaDrawerUnifiedPath').value.trim();
      tpaDrawerAct.unifiedPath = path;
      window.showToast('统一路径保存成功', 'success');
    });

    // 行级保存
    document.getElementById('tpaDrawerPathBody').addEventListener('click', function (e) {
      var btn = e.target.closest('.btn-tpa-drawer-save');
      if (!btn) return;
      var promoId = btn.getAttribute('data-promo-id');
      var input = document.querySelector('#tpaDrawerPathBody .path-drawer-input[data-promo-id="' + promoId + '"]');
      if (!input) return;
      var path = input.value.trim();
      if (!tpaDrawerAct.promoPaths) tpaDrawerAct.promoPaths = {};
      tpaDrawerAct.promoPaths[promoId] = path;
      input.classList.toggle('is-empty', !path);
      window.showToast('保存成功', 'success');
    });

    // 一键保存全部
    document.getElementById('tpaDrawerSaveAll').addEventListener('click', function () {
      var inputs = document.querySelectorAll('#tpaDrawerPathBody .path-drawer-input');
      var savedCount = 0;
      if (!tpaDrawerAct.promoPaths) tpaDrawerAct.promoPaths = {};
      inputs.forEach(function (input) {
        var promoId = input.getAttribute('data-promo-id');
        tpaDrawerAct.promoPaths[promoId] = input.value.trim();
        input.classList.remove('is-empty');
        savedCount++;
      });
      window.showToast('已保存 ' + savedCount + ' 条推广位路径', 'success');
    });
  }

  // 入口
  window.__initActivityList = function (initialTab) {
    if (initialTab) currentTab = initialTab;
    page = 1;
    searchKeyword = '';
    var si = document.getElementById('actSearchInput');
    if (si) si.value = '';
    renderTabs();
    renderList();
    initTabs();
    initSearch();
    initTpaForm();
    initTpaPathDrawer();
  };

  // 如果直接通过navigateTo加载（非onPageLoaded回调），自动初始化
  window.__initActivityList('all');
})();
</script>
