<!-- C03 推广位管理 - 列表页 -->
<div class="page-container">

  <!-- 分组Tab栏 -->
  <div class="promo-group-tabs-bar" id="promoGroupTabsBar">
    <div class="promo-group-tabs" id="promoGroupTabs">
      <!-- JS动态渲染 -->
    </div>
    <div class="promo-group-actions">
      <button class="btn btn-default btn-sm" id="btnAddGroup">+ 新增推广位分组</button>
      <button class="btn btn-primary btn-sm" id="btnAddPromo">+ 新增推广位</button>
    </div>
  </div>

  <!-- 工具栏 -->
  <div class="toolbar">
    <div class="search-bar">
      <input class="input" id="promoSearchInput" placeholder="搜索推广位名称或ID...">
    </div>
  </div>

  <!-- 列表表格 -->
  <div class="table-wrapper card">
    <table>
      <thead>
        <tr>
          <th style="width:180px">推广位名称</th>
          <th style="width:160px">推广位ID</th>
          <th style="width:120px" class="promo-group-col-head">所属分组</th>
          <th style="width:100px">绑定活动数</th>
          <th style="width:180px">创建时间</th>
          <th style="width:220px">操作</th>
        </tr>
      </thead>
      <tbody id="promoTableBody">
        <!-- JS动态渲染 -->
      </tbody>
    </table>
  </div>

  <!-- 分页 -->
  <div class="pagination" id="promoPagination"></div>

</div>

<!-- ====== 新增推广位分组弹窗 ====== -->
<div class="modal-overlay" id="groupFormOverlay" style="display:none">
  <div class="modal-box" style="width:420px">
    <div class="modal-header">
      <h3>新增推广位分组</h3>
      <button class="modal-close" id="btnGroupCancel">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label"><span class="required">*</span>分组名称</label>
        <input class="input" id="groupNameInput" placeholder="请输入分组名称" maxlength="10">
        <div class="form-error" id="groupFormError" style="display:none"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" id="btnGroupCancel2">取消</button>
      <button class="btn btn-primary" id="btnGroupCreate">创建</button>
    </div>
  </div>
</div>

<!-- ====== 新增/编辑推广位弹窗 ====== -->
<div class="modal-overlay" id="promoFormOverlay" style="display:none">
  <div class="modal-box" style="width:480px">
    <div class="modal-header">
      <h3 id="promoFormTitle">新增推广位</h3>
      <button class="modal-close" id="btnPromoCancel">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label"><span class="required">*</span>推广位名称</label>
        <input class="input" id="promoNameInput" placeholder="请输入推广位名称" maxlength="20">
        <div class="form-hint" id="promoFormHint">推广位名称不超过20个字符</div>
        <div class="form-error" id="promoFormError" style="display:none"></div>
      </div>
      <div class="form-group">
        <label class="form-label"><span class="required">*</span>所属分组</label>
        <div class="promo-group-select-row">
          <select class="input" id="promoGroupSelect" style="flex:1">
            <!-- JS动态渲染 -->
          </select>
          <button class="btn btn-link btn-sm" id="btnPromoNewGroup" style="white-space:nowrap">+ 新建</button>
        </div>
        <div class="promo-group-input-row" id="promoGroupInputRow" style="display:none">
          <input class="input" id="promoNewGroupInput" placeholder="输入新分组名称" maxlength="10" style="flex:1">
          <button class="btn btn-primary btn-sm" id="btnPromoConfirmGroup" style="white-space:nowrap">确认</button>
          <button class="btn btn-sm" id="btnPromoCancelGroup" style="white-space:nowrap">取消</button>
        </div>
        <div class="form-error" id="promoGroupError" style="display:none"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" id="btnPromoCancel2">取消</button>
      <button class="btn btn-primary" id="btnPromoSave">保存</button>
    </div>
  </div>
</div>
