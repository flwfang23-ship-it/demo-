<style>
  .act-list-container { padding: 0; }
  .act-list-empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--color-text-tertiary);
  }
  .act-list-empty-icon { font-size: 48px; margin-bottom: var(--spacing-md); opacity: 0.5; }
  .btn-add-tpa {
    padding: 6px 16px;
    background: var(--color-primary);
    color: #fff;
    border: none;
    border-radius: var(--radius-md);
    font-size: 13px;
    cursor: pointer;
    transition: all var(--transition-fast);
  }
  .btn-add-tpa:hover { filter: brightness(1.1); }
  .act-search-input { width: 220px !important; }

  /* 删除引导跳转权益页弹窗 */
  .tpa-redirect-box { max-width: 480px; }
  .tpa-redirect-config-list { margin-top: 8px; }
  .tpa-redirect-config-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: #FFF7E6;
    border-radius: var(--radius-md);
    font-size: 13px;
    color: var(--color-text-secondary);
  }
  .tpa-redirect-badge {
    display: inline-block;
    padding: 2px 8px;
    background: #FA8C16;
    color: #fff;
    font-size: 11px;
    border-radius: var(--radius-sm);
    white-space: nowrap;
  }
</style>

<div class="page-container act-list-container">
  <div class="page-header">
    <h2>活动清单</h2>
  </div>

  <!-- 顶部Tab + 搜索 -->
  <div class="act-list-toolbar">
    <div class="act-tabs" id="actTabs">
      <div class="act-tab-item active" data-tab="all">全部</div>
      <div class="act-tab-item" data-tab="meituan">美团联盟</div>
      <div class="act-tab-item" data-tab="eleme">淘宝闪购联盟</div>
      <div class="act-tab-item" data-tab="other">其他</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <div class="act-tab-actions" id="tpaAddBtn" style="display:none;">
        <button class="btn-add-tpa" id="btnAddTpa">+ 新增活动</button>
      </div>
      <div class="act-search">
        <input class="input act-search-input" id="actSearchInput" placeholder="搜索活动名称...">
        <button class="btn btn-primary btn-sm" id="btnActSearch">查询</button>
      </div>
    </div>
  </div>

  <!-- 活动列表容器 -->
  <div id="actListBody"></div>

  <!-- 分页 -->
  <div class="pagination" id="actPagination"></div>
</div>

<!-- 新增第三方活动弹窗 -->
<div class="modal-overlay" id="tpaFormModal" style="display:none;">
  <div class="modal-box">
    <div class="modal-header">
      <h3>新增第三方活动</h3>
      <button class="modal-close" id="tpaFormClose">&times;</button>
    </div>
    <div class="modal-body">
      <div class="tpa-form-group">
        <label>* 平台</label>
        <input type="text" id="tpaPlatform" placeholder="如：花小猪、滴滴">
      </div>
      <div class="tpa-form-group">
        <label>* 活动名称</label>
        <input type="text" id="tpaName" placeholder="请输入活动名称">
      </div>
      <div class="tpa-form-group">
        <label>* AppID</label>
        <input type="text" id="tpaAppId" placeholder="请输入AppID">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-default" id="tpaFormCancel">取消</button>
      <button class="btn btn-primary" id="tpaFormSubmit">创建</button>
    </div>
  </div>
</div>

<script>
(function () {
  'use strict';

  var currentTab = 'all';
  var searchKeyword = '';
  var page = 1;
  var pageSize = 10;

  var tabs = [
    { key: 'all', label: '全部' },
    { key: 'meituan', label: '美团联盟' },
    { key: 'eleme', label: '淘宝闪购联盟' },
    { key: 'other', label: '其他' }
  ];

  function getRegularActivities() {
    return window.MockData.availableActivities || [];
  }

  function getTpaList() {
    return window.MockData.thirdPartyActivities || [];
  }

  // 判断活动状态
  function getActivityStatus(act) {
    if (!act.endDate) return { cls: '', label: '' };
    var today = new Date();
    today.setHours(0, 0, 0, 0);
    var end = new Date(act.endDate);
    end.setHours(0, 0, 0, 0);
    if (end > today) return { cls: 'status-active', label: '进行中' };
    return { cls: 'status-ended', label: '已结束' };
  }

  // 过滤后的数据
  function getFilteredData() {
    var regular = getRegularActivities();
    var tpa = getTpaList();

    // 按Tab过滤
    if (currentTab === 'meituan') {
      regular = regular.filter(function (a) { return a.supplier === 'meituan'; });
      tpa = [];
    } else if (currentTab === 'eleme') {
      regular = regular.filter(function (a) { return a.supplier === 'eleme'; });
      tpa = [];
    } else if (currentTab === 'other') {
      regular = [];
    }

    // 搜索过滤
    if (searchKeyword) {
      var kw = searchKeyword.toLowerCase();
      regular = regular.filter(function (a) { return a.name.toLowerCase().indexOf(kw) !== -1; });
      tpa = tpa.filter(function (a) { return a.name.toLowerCase().indexOf(kw) !== -1 || a.platform.toLowerCase().indexOf(kw) !== -1; });
    }

    return { regular: regular, tpa: tpa };
  }

  function renderTabs() {
    var tabsEl = document.getElementById('actTabs');
    tabsEl.querySelectorAll('.act-tab-item').forEach(function (t) {
      t.classList.toggle('active', t.getAttribute('data-tab') === currentTab);
    });
    // 显示/隐藏新增第三方活动按钮
    document.getElementById('tpaAddBtn').style.display = currentTab === 'other' ? '' : 'none';
  }

  function renderList() {
    var body = document.getElementById('actListBody');
    var data = getFilteredData();
    var totalItems = data.regular.length + data.tpa.length;
    var totalPages = Math.max(1, Math.ceil(totalItems / pageSize));

    if (page > totalPages) page = totalPages;

    var start = (page - 1) * pageSize;
    var allItems = [];

    // 全部Tab: 先放普通活动，再放第三方活动（带分区标题）
    if (currentTab === 'all' && data.regular.length > 0 && data.tpa.length > 0) {
      // 按分页计算需要展示的项
      var i = 0;
      for (; i < data.regular.length && allItems.length < pageSize; i++) {
        if (i >= start) allItems.push({ type: 'regular', data: data.regular[i] });
      }
      var remainingSlots = pageSize - allItems.length;
      var tpaStart = Math.max(0, start - data.regular.length);
      for (var j = tpaStart; j < data.tpa.length && allItems.length < pageSize; j++) {
        allItems.push({ type: 'tpa', data: data.tpa[j] });
      }
    } else if (currentTab === 'other') {
      var pageData = data.tpa.slice(start, start + pageSize);
      pageData.forEach(function (item) { allItems.push({ type: 'tpa', data: item }); });
    } else {
      var pData = data.regular.slice(start, start + pageSize);
      pData.forEach(function (item) { allItems.push({ type: 'regular', data: item }); });
    }

    if (allItems.length === 0) {
      body.innerHTML = '<div class="act-list-empty"><div class="act-list-empty-icon">📋</div><div>暂无活动</div></div>';
      renderPagination(0, totalPages);
      return;
    }

    var html = '';
    var lastType = null;

    allItems.forEach(function (item) {
      // 分区标题（全部Tab混合展示时）
      if (currentTab === 'all' && item.type !== lastType) {
        if (item.type === 'tpa') {
          html += '<div class="act-section-title">第三方活动</div>';
        } else if (lastType === 'tpa') {
          // 如果从tpa切回regular（不太可能，但保留）
        }
      }
      lastType = item.type;

      if (item.type === 'regular') {
        html += renderRegularItem(item.data);
      } else {
        html += renderTpaItem(item.data);
      }
    });

    body.innerHTML = html;
    bindItemEvents();
    renderPagination(totalItems, totalPages);
  }

  function renderRegularItem(a) {
    var status = getActivityStatus(a);
    var statusHtml = status.label ? '<span class="act-status ' + status.cls + '">' + status.label + '</span>' : '';
    var bannerHtml = a.image
      ? '<img src="' + a.image + '" alt="' + a.name + '">'
      : '<span>活动Banner</span>';
    var subtitleHtml = a.subtitle || '';
    var venueHtml = a.venueId ? '会场ID：' + a.venueId : '';
    var startHtml = a.startDate ? '<div>开始：' + a.startDate + '</div>' : '';
    var endHtml = a.endDate ? '<div>截止：' + a.endDate + '</div>' : '';
    var commHtml = a.commission ? a.commission : '--';
    var supplierCls = a.supplier === 'meituan' ? 'meituan' : 'eleme';

    return '' +
      '<div class="act-list-item" data-act-id="' + a.id + '">' +
        '<div class="act-list-banner">' + bannerHtml + '</div>' +
        '<div class="act-list-info">' +
          '<div class="act-title-row">' +
            '<span class="act-title">' + a.name + '</span>' +
            statusHtml +
            '<span class="supplier-tag ' + supplierCls + '">' + a.supplierLabel + '</span>' +
          '</div>' +
          (subtitleHtml ? '<div class="act-subtitle">' + subtitleHtml + '</div>' : '') +
          (venueHtml ? '<div class="act-venue">' + venueHtml + '</div>' : '') +
        '</div>' +
        '<div class="act-list-time">' +
          startHtml +
          endHtml +
        '</div>' +
        '<div class="act-list-commission">' +
          '<div>预估佣金</div>' +
          '<div class="comm-value">' + commHtml + '</div>' +
        '</div>' +
        '<div class="act-list-actions">' +
          '<button class="btn-promote-sm" data-activity=\'' + JSON.stringify({ id: a.id, name: a.name, supplier: a.supplierLabel, supplierKey: a.supplier, subtitle: a.subtitle || '', commission: a.commission || '详询' }).replace(/'/g, '&#39;') + '\'>立即推广</button>' +
          '<a href="javascript:;" class="link-rule" data-venue="' + (a.venueId || '') + '">会场推广规则 &gt;</a>' +
        '</div>' +
      '</div>';
  }

  function renderTpaItem(a) {
    var delHtml = a.isPreset ? '' : '<button class="tpa-delete" data-tpa-id="' + a.id + '">删除</button>';
    var inUseHtml = hasBenefitConfig(a) ? '<span class="tpa-inuse-tag">使用中</span>' : '';
    return '' +
      '<div class="tpa-list-item" data-tpa-id="' + a.id + '">' +
        '<span class="tpa-platform-tag">' + a.platform + '</span>' +
        '<div class="tpa-info">' +
          '<div class="tpa-name">' + a.name + inUseHtml + '</div>' +
          '<div class="tpa-appid">AppID：' + a.appId + '</div>' +
        '</div>' +
        '<span class="tpa-arrow">配置推广位路径 &gt;</span>' +
        delHtml +
      '</div>';
  }

  function bindItemEvents() {
    // 普通活动 - 立即推广按钮
    document.querySelectorAll('.btn-promote-sm').forEach(function (btn) {
      btn.addEventListener('click', function (e) {
        e.stopPropagation();
        var info = JSON.parse(this.getAttribute('data-activity'));
        if (typeof openPromoteDrawer === 'function') {
          openPromoteDrawer(info);
        }
      });
    });

    // 普通活动 - 会场推广规则
    document.querySelectorAll('.link-rule').forEach(function (link) {
      link.addEventListener('click', function (e) {
        e.stopPropagation();
        var venueId = this.getAttribute('data-venue') || '暂无';
        window.showToast('会场推广规则：请参考平台活动推广规范（会场ID：' + venueId + '）', 'info');
      });
    });

    // 第三方活动 - 点击进入详情
    document.querySelectorAll('.tpa-list-item').forEach(function (item) {
      item.addEventListener('click', function () {
        var tpaId = this.getAttribute('data-tpa-id');
        sessionStorage.setItem('tpaDetailId', tpaId);
        window.AppNav.navigateTo('thirdparty-detail');
      });
    });

    // 第三方活动 - 删除按钮
    document.querySelectorAll('.tpa-delete').forEach(function (btn) {
      btn.addEventListener('click', function (e) {
        e.stopPropagation();
        var tpaId = this.getAttribute('data-tpa-id');
        confirmDeleteTpa(tpaId);
      });
    });
  }

  // 检查活动是否在权益页有配置（promoPaths 中有任意非空值）
  function hasBenefitConfig(act) {
    var paths = act.promoPaths || {};
    var keys = Object.keys(paths);
    for (var i = 0; i < keys.length; i++) {
      if (paths[keys[i]] && paths[keys[i]].trim() !== '') return true;
    }
    return false;
  }

  // 自定义确认弹窗（用于二次确认删除）
  function showTpaConfirm(title, msg, onConfirm) {
    var overlay = document.createElement('div');
    overlay.className = 'confirm-overlay';
    overlay.innerHTML =
      '<div class="confirm-box">' +
      '<div class="confirm-header">' + title + '</div>' +
      '<div class="confirm-body" style="white-space:pre-line">' + msg + '</div>' +
      '<div class="confirm-footer">' +
      '<button class="btn btn-cancel-confirm">取消</button>' +
      '<button class="btn btn-danger btn-ok-confirm">确认删除</button>' +
      '</div>' +
      '</div>';

    document.body.appendChild(overlay);

    overlay.querySelector('.btn-cancel-confirm').onclick = function () { overlay.remove(); };
    overlay.querySelector('.btn-ok-confirm').onclick = function () { overlay.remove(); if (onConfirm) onConfirm(); };
    overlay.onclick = function (e) { if (e.target === overlay) overlay.remove(); };
  }

  function confirmDeleteTpa(tpaId) {
    var tpaList = getTpaList();
    var act = tpaList.find(function (a) { return a.id === tpaId; });
    if (!act) return;
    if (act.isPreset) {
      window.showToast('预设活动不可删除', 'error');
      return;
    }

    // 校验权益页是否有配置该活动
    if (hasBenefitConfig(act)) {
      showRedirectToBenefit(act);
    } else {
      showTpaConfirm(
        '确认删除',
        '确定要删除第三方活动「' + act.name + '」吗？\n删除后不可恢复。',
        function () {
          window.MockData.thirdPartyActivities = tpaList.filter(function (a) { return a.id !== tpaId; });
          window.showToast('已删除「' + act.name + '」', 'success');
          renderList();
        }
      );
    }
  }

  // 引导跳转权益页弹窗
  function showRedirectToBenefit(act) {
    var overlay = document.createElement('div');
    overlay.className = 'confirm-overlay';
    overlay.innerHTML =
      '<div class="confirm-box tpa-redirect-box">' +
      '<div class="confirm-header">无法删除</div>' +
      '<div class="confirm-body">' +
        '<p style="margin-bottom:12px;">活动「<strong>' + act.name + '</strong>」已在权益页中配置，请先前往权益页取消该活动的配置后再删除。</p>' +
        '<div class="tpa-redirect-config-list">' +
          '<div class="tpa-redirect-config-item">' +
            '<span class="tpa-redirect-badge">已配置</span>' +
            '<span>共 ' + Object.values(act.promoPaths).filter(function(v) { return v && v.trim(); }).length + ' 个推广位配置了路径</span>' +
          '</div>' +
        '</div>' +
      '</div>' +
      '<div class="confirm-footer">' +
      '<button class="btn btn-default btn-cancel-redirect">取消</button>' +
      '<button class="btn btn-primary btn-goto-benefit">前往权益页配置</button>' +
      '</div>' +
      '</div>';

    document.body.appendChild(overlay);

    overlay.querySelector('.btn-cancel-redirect').onclick = function () { overlay.remove(); };
    overlay.querySelector('.btn-goto-benefit').onclick = function () {
      overlay.remove();
      window.AppNav.navigateTo('benefit-config');
    };
    overlay.onclick = function (e) { if (e.target === overlay) overlay.remove(); };
  }

  function renderPagination(totalItems, totalPages) {
    var el = document.getElementById('actPagination');
    if (totalPages <= 1) {
      el.innerHTML = '<span class="page-info">共 ' + totalItems + ' 条</span>';
      return;
    }
    var html = '<span class="page-info">共 ' + totalItems + ' 条</span>';
    html += '<button class="page-btn"' + (page <= 1 ? ' disabled' : '') + ' data-page="' + (page - 1) + '">上一页</button>';
    for (var i = 1; i <= totalPages; i++) {
      html += '<button class="page-btn' + (i === page ? ' active' : '') + '" data-page="' + i + '">' + i + '</button>';
    }
    html += '<button class="page-btn"' + (page >= totalPages ? ' disabled' : '') + ' data-page="' + (page + 1) + '">下一页</button>';
    el.innerHTML = html;

    el.querySelectorAll('.page-btn').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var p = parseInt(this.getAttribute('data-page'));
        if (p >= 1 && p <= totalPages) { page = p; renderList(); }
      });
    });
  }

  // Tab切换
  function initTabs() {
    document.getElementById('actTabs').addEventListener('click', function (e) {
      var tab = e.target.closest('.act-tab-item');
      if (!tab) return;
      currentTab = tab.getAttribute('data-tab');
      page = 1;
      searchKeyword = '';
      document.getElementById('actSearchInput').value = '';
      renderTabs();
      renderList();
    });
  }

  // 搜索
  function initSearch() {
    document.getElementById('btnActSearch').addEventListener('click', function () {
      searchKeyword = document.getElementById('actSearchInput').value.trim();
      page = 1;
      renderList();
    });
    document.getElementById('actSearchInput').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') { document.getElementById('btnActSearch').click(); }
    });
  }

  // 新增第三方活动弹窗
  function initTpaForm() {
    var modal = document.getElementById('tpaFormModal');

    document.getElementById('btnAddTpa').addEventListener('click', function () {
      document.getElementById('tpaPlatform').value = '';
      document.getElementById('tpaName').value = '';
      document.getElementById('tpaAppId').value = '';
      modal.style.display = 'flex';
    });

    document.getElementById('tpaFormClose').onclick = function () { closeModalAnimated(modal); };
    document.getElementById('tpaFormCancel').onclick = function () { closeModalAnimated(modal); };
    modal.onclick = function (e) { if (e.target === modal) closeModalAnimated(modal); };

    document.getElementById('tpaFormSubmit').addEventListener('click', function () {
      var platform = document.getElementById('tpaPlatform').value.trim();
      var name = document.getElementById('tpaName').value.trim();
      var appId = document.getElementById('tpaAppId').value.trim();

      if (!platform) { window.showToast('请输入平台名称', 'error'); return; }
      if (!name) { window.showToast('请输入活动名称', 'error'); return; }
      if (!appId) { window.showToast('请输入AppID', 'error'); return; }

      var tpaList = getTpaList();
      var dup = tpaList.find(function (a) { return a.platform === platform && a.name === name; });
      if (dup) { window.showToast('该平台下已存在同名活动', 'error'); return; }

      var newId = 'TPA_' + String(tpaList.length + 1).padStart(3, '0');
      var promos = (window.MockData.getAllPromotions ? window.MockData.getAllPromotions() : (window.MockData.promotions || []));
      var promoPaths = {};
      promos.forEach(function (p) { promoPaths[p.id] = ''; });

      var newTpa = {
        id: newId,
        platform: platform,
        name: name,
        appId: appId,
        isPreset: false,
        promoPaths: promoPaths
      };

      window.MockData.thirdPartyActivities.push(newTpa);
      closeModalAnimated(modal);
      window.showToast('第三方活动「' + name + '」创建成功', 'success');
      renderList();
    });
  }

  // 入口
  window.__initActivityList = function (initialTab) {
    if (initialTab) currentTab = initialTab;
    page = 1;
    searchKeyword = '';
    var si = document.getElementById('actSearchInput');
    if (si) si.value = '';
    renderTabs();
    renderList();
    initTabs();
    initSearch();
    initTpaForm();
  };

  // 如果直接通过navigateTo加载（非onPageLoaded回调），自动初始化
  window.__initActivityList('all');
})();
</script>
