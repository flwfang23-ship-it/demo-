<div class="page-container" id="dashboardPage">

  <!-- 新人引导横幅 -->
  <div class="onboarding-banner" id="onboardingBanner" style="display:none;">
    <div class="onboarding-banner-icon">🎯</div>
    <div class="onboarding-banner-text">
      <span class="onboarding-banner-label">新手任务</span>
      <span class="onboarding-banner-progress" id="obBannerProgress">1/4 · 下一步：上传营业执照</span>
    </div>
    <button class="onboarding-banner-btn" id="obBannerBtn">去完成 →</button>
  </div>

  <!-- 顶部区域：昨日数据(左2/3) + 财务数据(右1/3) -->
  <div class="dashboard-top">
    <!-- 模块②：昨日数据（收入概览区） -->
    <div class="yesterday-income" id="yesterdayIncome" title="点击查看昨日日报详情">
      <div class="card-title">收入数据概览</div>
      <div class="card-hint">只统计使用专属渠道的链接收入</div>
      <div class="income-metrics" id="incomeMetrics">
        <!-- JS动态渲染 -->
      </div>
    </div>

    <!-- 模块③：财务数据（资金提现区） -->
    <div class="balance-card" id="balanceCard">
      <!-- JS动态渲染 -->
    </div>
  </div>

  <!-- 模块①：取链模块（业务推广核心区） -->
  <div class="promotion-area" id="promotionArea">
    <!-- 供应商Tab栏 -->
    <div class="supplier-tabs" id="supplierTabs">
      <!-- JS动态渲染 -->
    </div>
    <!-- 活动卡片网格 -->
    <div class="activity-card-grid" id="activityCardGrid">
      <!-- JS动态渲染 -->
    </div>
  </div>

</div>

<!-- 提现弹窗 -->
<div class="withdraw-modal-overlay" id="withdrawModal" style="display:none;">
  <div class="withdraw-modal">
    <h3>申请提现</h3>
    <div class="modal-balance">
      可提现余额：<strong id="wAvailable">¥ --</strong>
    </div>
    <div class="form-group">
      <label>提现金额 *</label>
      <input type="number" id="wAmount" placeholder="请输入提现金额" min="100" step="0.01">
      <div class="form-hint">最低提现：¥100.00</div>
      <div class="form-error" id="wError" style="display:none;"></div>
    </div>
    <div class="modal-info">
      <div>到账账户</div>
      <div style="margin-top:4px;font-weight:500;">工商银行 尾号 8876</div>
      <div style="margin-top:4px;color:#999;">预计到账时间：1-3 个工作日</div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="wCancel">取消</button>
      <button class="btn-confirm" id="wConfirm">确认提现</button>
    </div>
  </div>
</div>
