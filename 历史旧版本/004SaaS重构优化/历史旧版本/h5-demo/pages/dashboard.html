<div class="page-container" id="dashboardPage">

  <!-- 顶部区域：昨日数据(左2/3) + 财务数据(右1/3) -->
  <div class="dashboard-top">
    <!-- 模块②：昨日数据（收入概览区） -->
    <div class="yesterday-income" id="yesterdayIncome" title="点击查看昨日日报详情">
      <div class="card-title">收入数据概览</div>
      <div class="card-hint">只统计使用专属渠道的链接收入</div>
      <div class="income-metrics" id="incomeMetrics">
        <!-- JS动态渲染 -->
      </div>
    </div>

    <!-- 模块③：财务数据（资金提现区） -->
    <div class="balance-card" id="balanceCard">
      <!-- JS动态渲染 -->
    </div>
  </div>

  <!-- 模块①：取链模块（业务推广核心区） -->
  <div class="promotion-area" id="promotionArea">
    <!-- 供应商Tab栏 -->
    <div class="supplier-tabs" id="supplierTabs">
      <!-- JS动态渲染 -->
    </div>
    <!-- 活动卡片网格 -->
    <div class="activity-card-grid" id="activityCardGrid">
      <!-- JS动态渲染 -->
    </div>
  </div>

</div>

<!-- 提现弹窗 -->
<div class="withdraw-modal-overlay" id="withdrawModal" style="display:none;">
  <div class="withdraw-modal">
    <h3>申请提现</h3>
    <div class="modal-balance">
      可提现余额：<strong id="wAvailable">¥ --</strong>
    </div>
    <div class="form-group">
      <label>提现金额 *</label>
      <input type="number" id="wAmount" placeholder="请输入提现金额" min="100" step="0.01">
      <div class="form-hint">最低提现：¥100.00</div>
      <div class="form-error" id="wError" style="display:none;"></div>
    </div>
    <div class="modal-info">
      <div>到账账户</div>
      <div style="margin-top:4px;font-weight:500;">工商银行 尾号 8876</div>
      <div style="margin-top:4px;color:#999;">预计到账时间：1-3 个工作日</div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="wCancel">取消</button>
      <button class="btn-confirm" id="wConfirm">确认提现</button>
    </div>
  </div>
</div>

<!-- ====== 推广链接抽屉（Drawer） ====== -->
<div class="drawer-overlay" id="promoteDrawerOverlay" style="display:none;">
  <div class="drawer" id="promoteDrawer">

    <!-- 标题区 -->
    <div class="drawer-header">
      <h3 class="drawer-title" id="drawerActivityTitle">活动名称</h3>
      <button class="drawer-close" id="drawerCloseBtn">&times;</button>
    </div>

    <!-- 内容区 -->
    <div class="drawer-body">

      <!-- 活动信息 -->
      <div class="drawer-activity-info">
        <div class="drawer-activity-tags">
          <span class="supplier-tag meituan" id="drawerSupplierTag">美团</span>
          <span class="drawer-activity-name" id="drawerActivityName">外卖</span>
        </div>
        <div class="drawer-activity-desc" id="drawerActivityDesc">活动描述</div>
      </div>

      <!-- 选择推广位 -->
      <div class="drawer-section">
        <div class="drawer-section-title">
          <span>选择推广位</span>
          <a href="javascript:;" class="drawer-add-link" id="drawerAddPromo">添加推广位</a>
        </div>
        <select class="select" id="drawerPromoSelect" style="width:100%;">
          <!-- JS动态渲染 -->
        </select>
      </div>

      <!-- 文案素材 -->
      <div class="drawer-section">
        <div class="drawer-section-title">文案素材</div>
        <div class="drawer-radio-group" id="drawerLinkTypeGroup">
          <label class="drawer-radio-item">
            <input type="radio" name="drawerLinkType" value="long_url" checked>
            <span class="drawer-radio-label">长链接</span>
          </label>
          <label class="drawer-radio-item">
            <input type="radio" name="drawerLinkType" value="short_url">
            <span class="drawer-radio-label">短链接</span>
          </label>
          <label class="drawer-radio-item">
            <input type="radio" name="drawerLinkType" value="deeplink">
            <span class="drawer-radio-label">呼起协议</span>
          </label>
          <label class="drawer-radio-item">
            <input type="radio" name="drawerLinkType" value="miniapp_path">
            <span class="drawer-radio-label">小程序路径</span>
          </label>
          <label class="drawer-radio-item">
            <input type="radio" name="drawerLinkType" value="qrcode">
            <span class="drawer-radio-label">小程序二维码</span>
          </label>
          <label class="drawer-radio-item">
            <input type="radio" name="drawerLinkType" value="group_token">
            <span class="drawer-radio-label">团口令</span>
          </label>
          <label class="drawer-radio-item">
            <input type="radio" name="drawerLinkType" value="search_token">
            <span class="drawer-radio-label">搜索密令</span>
          </label>
        </div>
        <div class="drawer-hint">选择「短链接」可用返回的链接自行生成二维码。</div>
      </div>

      <!-- 返回数据 -->
      <div class="drawer-section">
        <div class="drawer-section-title">返回数据</div>
        <div class="drawer-result-box" id="drawerResultBox">
          <div class="drawer-result-empty">
            <span>点击「生成推广链接」后，将在此显示链接或团口令等有用信息</span>
          </div>
        </div>
      </div>

    </div>

    <!-- 底部操作区 -->
    <div class="drawer-footer">
      <button class="btn btn-primary drawer-btn-main" id="drawerBtnGenerate">生成推广链接</button>
      <button class="btn drawer-btn-close" id="drawerBtnClose">关闭</button>
    </div>

  </div>
</div>
