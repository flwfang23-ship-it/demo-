<body>

  <div class="app-layout">

    <!-- ====== 侧边栏 ====== -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icon">S</div>
        <span class="sidebar-logo-text">SaaS营销平台</span>
      </div>

      <nav class="sidebar-nav" id="sidebarNav">
        <!-- JS动态渲染菜单 -->
      </nav>

      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="sidebar-user-avatar">阳</div>
          <div class="sidebar-user-info">
            <div class="sidebar-user-name">阳光咖啡连锁</div>
            <div class="sidebar-user-role">商户管理员</div>
          </div>
        </div>
      </div>
    </aside>


    <!-- ====== 右侧主体 ====== -->
    <div class="main-area">

      <!-- 顶栏 -->
      <header class="header">
        <div class="header-left">
          <div class="header-breadcrumb" id="headerBreadcrumb">
            <span>🏠 首页</span>
          </div>
        </div>
        <div class="header-right">
          <div class="header-notify" title="消息通知">
            🔔
            <div class="header-notify-dot notify-pulse"></div>
          </div>
        </div>
      </header>

      <!-- 内容区 -->
      <main class="content content-smooth" id="pageContent">
        <!-- 页面内容由JS动态加载 -->
      </main>

    </div>
  </div>

  <!-- Toast容器 -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- ====== JS ====== -->
  <script src="js/mock-data.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/promotion.js"></script>
  <script src="js/benefit-config.js"></script>

  <!-- Toast工具函数 -->
  <script>
    window.showToast = function (message, type) {
      type = type || 'info';
      var container = document.getElementById('toastContainer');
      var toast = document.createElement('div');
      toast.className = 'toast toast-' + type + ' toast-animated';
      toast.textContent = message;
      container.appendChild(toast);
      setTimeout(function () {
        toast.classList.add('toast-hiding');
        toast.addEventListener('animationend', function () { toast.remove(); }, { once: true });
      }, 2500);
    };

    // 格式化金额
    function fmtMoney(val) {
      if (val == null) return '--';
      return '¥' + Number(val).toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function fmtInt(val) {
      if (val == null) return '--';
      return Number(val).toLocaleString('zh-CN');
    }

    // 数字滚动动画（从0到目标值）
    function animateNumber(el, targetVal, formatter, duration) {
      duration = duration || 600;
      formatter = formatter || function (v) { return v; };
      var start = null;
      var target = parseFloat(targetVal) || 0;
      function step(ts) {
        if (!start) start = ts;
        var progress = Math.min((ts - start) / duration, 1);
        // ease-out quad
        var eased = 1 - (1 - progress) * (1 - progress);
        el.textContent = formatter(target * eased);
        if (progress < 1) requestAnimationFrame(step);
        else el.textContent = formatter(target);
      }
      requestAnimationFrame(step);
    }

    // 关闭弹窗（带动画）
    function closeModalAnimated(overlay, callback) {
      if (!overlay) return;
      if (!overlay.classList.contains('modal-animated')) {
        overlay.classList.add('modal-animated');
      }
      overlay.classList.add('modal-closing');
      var done = false;
      var onEnd = function () {
        if (done) return;
        done = true;
        overlay.removeEventListener('animationend', onEnd);
        overlay.style.display = 'none';
        overlay.classList.remove('modal-closing', 'modal-animated');
        if (callback) callback();
      };
      overlay.addEventListener('animationend', onEnd);
      // 安全超时：300ms后强制关闭
      setTimeout(onEnd, 350);
    }

    // 打开弹窗（带动画）
    function openModalAnimated(overlay) {
      if (!overlay) return;
      overlay.classList.add('modal-animated');
      overlay.style.display = 'flex';
    }

    // ================================================================
    //  C01 首页推广工作台
    // ================================================================
    function initDashboard() {
      // 模拟并行加载三个数据源（使用 setTimeout 展示加载→渲染过程）
      var d = window.MockData;
      setTimeout(function () { renderIncomeModule(d.latestReport); }, 100);
      setTimeout(function () { renderBalanceModule(d.financeData); }, 150);
      setTimeout(function () { renderPromotionModule(d.availableActivities); }, 200);
      // 绑定抽屉事件（抽屉在 dashboard.html 中，首次加载后绑定）
      setTimeout(function () { bindDrawerEvents(); }, 300);
    }

    // ---- 模块②：昨日数据 ----
    function renderIncomeModule(data) {
      var el = document.getElementById('incomeMetrics');
      if (!el) return;

      var incomeEmpty = data && data.income == null;
      var ordersEmpty = data && data.orders == null;

      var incomeChangeHtml = '';
      if (data && data.incomeChange != null) {
        var cls = data.incomeChange > 0 ? 'up' : (data.incomeChange < 0 ? 'down' : '');
        var arrow = data.incomeChange > 0 ? '↑' : (data.incomeChange < 0 ? '↓' : '');
        incomeChangeHtml = '<div class="metric-change ' + cls + '">较前日 ' + arrow + ' ' + Math.abs(data.incomeChange) + '%</div>';
      }

      var ordersChangeHtml = '';
      if (data && data.ordersChange != null) {
        var cls2 = data.ordersChange > 0 ? 'up' : (data.ordersChange < 0 ? 'down' : '');
        var arrow2 = data.ordersChange > 0 ? '↑' : (data.ordersChange < 0 ? '↓' : '');
        ordersChangeHtml = '<div class="metric-change ' + cls2 + '">较前日 ' + arrow2 + ' ' + Math.abs(data.ordersChange) + '%</div>';
      }

      var incomeDisplay = incomeEmpty ? '--' : '¥0';
      var ordersDisplay = ordersEmpty ? '--' : '0';

      el.innerHTML =
        '<div class="metric-item">' +
          '<div class="metric-label">昨日预估佣金(元)</div>' +
          '<div class="metric-value' + (incomeEmpty ? ' is-empty' : '') + '" id="metricIncome">' + incomeDisplay + '</div>' +
          incomeChangeHtml +
        '</div>' +
        '<div class="metric-item">' +
          '<div class="metric-label">昨日订单数</div>' +
          '<div class="metric-value' + (ordersEmpty ? ' is-empty' : '') + '" id="metricOrders">' + ordersDisplay + '</div>' +
          ordersChangeHtml +
        '</div>';

      // 数字滚动动画
      if (!incomeEmpty) {
        animateNumber(
          document.getElementById('metricIncome'),
          data.income,
          function (v) { return '¥' + Number(v).toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
        );
      }
      if (!ordersEmpty) {
        animateNumber(document.getElementById('metricOrders'), data.orders, function (v) { return Number(Math.round(v)).toLocaleString('zh-CN'); });
      }

      // 点击跳转日报列表
      var card = document.getElementById('yesterdayIncome');
      if (card) {
        card.onclick = function () {
          window.AppNav.navigateTo('reports-list');
        };
      }
    }

    // ---- 模块③：财务数据 ----
    function renderBalanceModule(data) {
      var el = document.getElementById('balanceCard');
      if (!el) return;

      if (!data || !data.accountBound) {
        el.innerHTML =
          '<div class="card-label">账户余额(元)</div>' +
          '<div class="unbound-hint">请先绑定提现账户</div>' +
          '<button class="btn-bind" onclick="window.showToast(\'功能开发中，请联系运营绑定\',\'info\')">去绑定</button>';
        return;
      }

      var disabled = data.balance <= 0 ? ' disabled' : '';
      el.innerHTML =
        '<div class="card-label">账户余额(元)</div>' +
        '<div class="balance-amount" id="balanceAmount">¥0</div>' +
        '<button class="btn-withdraw"' + disabled + ' id="btnWithdraw">提现</button>' +
        '<div class="balance-footer">' +
          '<div class="balance-footer-item">提现审核中(元)<div class="balance-footer-value">' + fmtMoney(data.pendingWithdraw) + '</div></div>' +
          '<div class="balance-footer-item">已提现(元)<div class="balance-footer-value">' + fmtMoney(data.totalWithdrawn) + '</div></div>' +
        '</div>';

      animateNumber(
        document.getElementById('balanceAmount'),
        data.balance,
        function (v) { return '¥' + Number(v).toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
      );

      // 绑定提现按钮
      var btn = el.querySelector('#btnWithdraw');
      if (btn && !disabled) {
        btn.addEventListener('click', function (e) { e.stopPropagation(); openWithdrawModal(data); });
      }
    }

    // 提现弹窗
    function openWithdrawModal(finData) {
      var modal = document.getElementById('withdrawModal');
      if (!modal) return;
      openModalAnimated(modal);

      document.getElementById('wAvailable').textContent = fmtMoney(finData.balance);
      document.getElementById('wAmount').value = '';
      document.getElementById('wError').style.display = 'none';
      document.getElementById('wConfirm').disabled = false;

      // 取消
      document.getElementById('wCancel').onclick = function () { closeModalAnimated(modal); };

      // 确认提现
      document.getElementById('wConfirm').onclick = function () {
        var amount = parseFloat(document.getElementById('wAmount').value);
        var errEl = document.getElementById('wError');
        if (isNaN(amount) || amount < 100) {
          errEl.textContent = '最低提现金额为 ¥100.00';
          errEl.style.display = 'block';
          return;
        }
        if (amount > finData.balance) {
          errEl.textContent = '提现金额不能超过可提现余额';
          errEl.style.display = 'block';
          return;
        }
        errEl.style.display = 'none';
        document.getElementById('wConfirm').disabled = true;
        document.getElementById('wConfirm').textContent = '提交中...';
        setTimeout(function () {
          closeModalAnimated(modal);
          window.showToast('提现申请已提交，预计1-3个工作日到账', 'success');
          // 更新 mock 数据
          finData.balance -= amount;
          finData.pendingWithdraw += amount;
          setTimeout(function () { renderBalanceModule(finData); }, 250);
        }, 800);
      };

      // 点击遮罩关闭
      modal.onclick = function (e) { if (e.target === modal) closeModalAnimated(modal); };
    }

    // ---- 模块①：取链模块 ----
    function renderPromotionModule(activities) {
      var tabsEl = document.getElementById('supplierTabs');
      var gridEl = document.getElementById('activityCardGrid');
      if (!tabsEl || !gridEl) return;

      if (!activities || activities.length === 0) {
        tabsEl.innerHTML = '';
        gridEl.innerHTML = '<div class="activity-empty"><div class="activity-empty-icon">📭</div><div>暂无可用活动，请联系运营</div></div>';
        return;
      }

      // 构建供应商Tab列表
      var suppliers = [{ key: 'all', label: '全部' }];
      var seen = {};
      activities.forEach(function (a) {
        if (!seen[a.supplier]) {
          seen[a.supplier] = true;
          suppliers.push({ key: a.supplier, label: a.supplierLabel });
        }
      });

      var currentTab = 'all';

      function renderTabs() {
        var html = '';
        suppliers.forEach(function (s) {
          html += '<div class="supplier-tab-item' + (s.key === currentTab ? ' active' : '') + '" data-supplier="' + s.key + '">' + s.label + '</div>';
        });
        tabsEl.innerHTML = html;

        // 绑定Tab点击
        tabsEl.querySelectorAll('.supplier-tab-item').forEach(function (tab) {
          tab.addEventListener('click', function () {
            currentTab = this.getAttribute('data-supplier');
            renderTabs();
            renderCards();
          });
        });
      }

      function renderCards() {
        var filtered = activities;
        if (currentTab !== 'all') {
          filtered = activities.filter(function (a) { return a.supplier === currentTab; });
        }

        if (filtered.length === 0) {
          gridEl.innerHTML = '<div class="activity-empty"><div class="activity-empty-icon">📭</div><div>该供应商暂无可用活动</div></div>';
          return;
        }

        var html = '';
        filtered.forEach(function (a) {
          var imageHtml = a.image
            ? '<img src="' + a.image + '" alt="' + a.name + '">'
            : '<span>活动主图</span>';
          var commissionHtml = a.commission
            ? '<div class="card-commission">预估佣金 ' + a.commission + '</div>'
            : '<div class="card-commission" style="color:#999;">佣金详询</div>';
          var validityHtml = a.endDate
            ? '<div class="card-validity">截止 ' + a.endDate + '</div>'
            : '';
          var subtitleHtml = a.subtitle
            ? '<div class="card-subtitle">' + a.subtitle + '</div>'
            : '';
          var supplierCls = a.supplier === 'meituan' ? 'meituan' : 'eleme';

          html +=
            '<div class="activity-card">' +
              '<div class="card-image">' + imageHtml + '</div>' +
              '<div class="card-body">' +
                '<div class="card-title">' + a.name + '</div>' +
                subtitleHtml +
                '<div class="card-tags"><span class="supplier-tag ' + supplierCls + '">' + a.supplierLabel + '</span></div>' +
                commissionHtml +
                validityHtml +
                '<button class="btn-promote" data-activity=\'' + JSON.stringify({ id: a.id, name: a.name, supplier: a.supplierLabel, supplierKey: a.supplier, subtitle: a.subtitle || '', commission: a.commission || '详询' }).replace(/'/g, '&#39;') + '\'>立即推广</button>' +
              '</div>' +
            '</div>';
        });
        gridEl.innerHTML = html;

        // 绑定立即推广按钮 → 打开抽屉
        gridEl.querySelectorAll('.btn-promote').forEach(function (btn) {
          btn.addEventListener('click', function () {
            var info = JSON.parse(this.getAttribute('data-activity'));
            openPromoteDrawer(info);
          });
        });
      }

      renderTabs();
      renderCards();
    }

    // ====== 推广链接抽屉（Drawer） ======
    var currentDrawerActivity = null;

    function openPromoteDrawer(activity) {
      var overlay = document.getElementById('promoteDrawerOverlay');
      if (!overlay) return;

      currentDrawerActivity = activity;

      // 填标题
      document.getElementById('drawerActivityTitle').textContent = activity.name;

      // 填活动信息
      var supplierCls = (activity.supplierKey === 'meituan') ? 'meituan' : 'eleme';
      var supplierTag = document.getElementById('drawerSupplierTag');
      supplierTag.textContent = activity.supplier || '';
      supplierTag.className = 'supplier-tag ' + supplierCls;
      document.getElementById('drawerActivityName').textContent = activity.name;
      var descParts = [];
      if (activity.commission) descParts.push('预估佣金 ' + activity.commission);
      if (activity.subtitle) descParts.push(activity.subtitle);
      document.getElementById('drawerActivityDesc').textContent = descParts.join(' · ') || '暂无描述';

      // 填推广位下拉
      var promotions = window.MockData.promotions || [];
      var promoSelect = document.getElementById('drawerPromoSelect');
      promoSelect.innerHTML = promotions.map(function (p) {
        return '<option value="' + p.id + '"' + (p.isDefault ? ' selected' : '') + '>' + (p.isDefault ? '· ' : '') + p.name + '</option>';
      }).join('');

      // 重置素材类型为长链接
      var radios = document.querySelectorAll('input[name="drawerLinkType"]');
      if (radios.length > 0) radios[0].checked = true;

      // 重置结果区
      resetDrawerResult();

      // 打开（带遮罩动画）
      overlay.style.display = 'flex';
      overlay.classList.add('modal-animated');
      document.body.style.overflow = 'hidden';
    }

    function closePromoteDrawer() {
      var overlay = document.getElementById('promoteDrawerOverlay');
      if (!overlay) return;
      closeModalAnimated(overlay, function () {
        document.body.style.overflow = '';
      });
    }

    function resetDrawerResult() {
      var box = document.getElementById('drawerResultBox');
      box.className = 'drawer-result-box';
      box.innerHTML = '<div class="drawer-result-empty"><span>点击「生成推广链接」后，将在此显示链接或团口令等有用信息</span></div>';
    }

    function generateDrawerLink() {
      var promoSelect = document.getElementById('drawerPromoSelect');
      var slotId = promoSelect.value;
      var slotName = promoSelect.options[promoSelect.selectedIndex].text.replace('· ', '');
      var promotions = window.MockData.promotions || [];
      var slot = promotions.find(function (p) { return p.id === slotId; });

      var linkTypeRadio = document.querySelector('input[name="drawerLinkType"]:checked');
      var linkType = linkTypeRadio ? linkTypeRadio.value : 'long_url';

      var act = currentDrawerActivity;
      if (!act) return;

      // 模拟各类型返回值
      var typeLabelMap = {
        'long_url': '长链接',
        'short_url': '短链接',
        'deeplink': '呼起协议',
        'miniapp_path': '小程序路径',
        'qrcode': '小程序二维码',
        'group_token': '团口令',
        'search_token': '搜索密令'
      };
      var typeLabel = typeLabelMap[linkType] || linkType;

      var resultMap = {
        'long_url': 'https://tbk.sunnycoffee.com/p/' + act.id + '?slot=' + slotId,
        'short_url': 'https://tbk.sc.cn/' + act.id.substring(0, 6),
        'deeplink': 'tbkopentbk://startapp?activityId=' + act.id + '&slotId=' + slotId,
        'miniapp_path': '/pages/activity/index?activityId=' + act.id + '&slotId=' + slotId,
        'qrcode': 'https://tbk.sc.cn/qr/' + act.id,
        'group_token': '【阳光咖啡】' + act.name + '，复制口令打开App立享优惠 ¥' + act.commission,
        'search_token': '搜索"阳光咖啡' + act.name.substring(0, 4) + '"即可参与活动'
      };
      var result = resultMap[linkType] || resultMap['long_url'];

      showDrawerResult(result, typeLabel);
    }

    function showDrawerResult(text, typeLabel) {
      var box = document.getElementById('drawerResultBox');
      box.className = 'drawer-result-box has-data';
      box.innerHTML =
        '<div style="font-size:12px;color:var(--color-text-tertiary);margin-bottom:8px;">已生成 ' + typeLabel + '</div>' +
        '<div class="drawer-result-content">' +
          '<div class="drawer-result-text">' + text + '</div>' +
          '<button class="btn btn-primary drawer-result-copy" id="drawerBtnCopy">📋 复制</button>' +
        '</div>';

      document.getElementById('drawerBtnCopy').onclick = function () {
        navigator.clipboard.writeText(text).then(function () {
          window.showToast('已复制到剪贴板', 'success');
        }).catch(function () {
          window.showToast('复制失败，请手动复制', 'error');
        });
      };
    }

    // 绑定抽屉所有事件（在抽屉HTML加载后调用一次）
    function bindDrawerEvents() {
      var overlay = document.getElementById('promoteDrawerOverlay');
      if (!overlay || overlay._drawerBound) return;
      overlay._drawerBound = true;

      // 关闭按钮
      document.getElementById('drawerCloseBtn').onclick = closePromoteDrawer;
      document.getElementById('drawerBtnClose').onclick = closePromoteDrawer;
      overlay.onclick = function (e) { if (e.target === overlay) closePromoteDrawer(); };

      // 生成按钮
      document.getElementById('drawerBtnGenerate').onclick = generateDrawerLink;

      // 添加推广位
      document.getElementById('drawerAddPromo').onclick = function () {
        closePromoteDrawer();
        setTimeout(function () { window.AppNav.navigateTo('promotion-list'); }, 300);
      };
    }

    // dashboard 初始化时绑定抽屉事件

    // ================================================================
    //  C02 小程序管理
    // ================================================================
    var mpState = {
      allData: [],
      filtered: [],
      page: 1,
      pageSize: 5,
      search: '',
      statusFilter: '',
      subscribeFilter: '',
      selectedIds: []
    };

    function initMiniprogramList() {
      mpState.allData = (window.MockData.miniPrograms || []).slice().sort(function (a, b) {
        return new Date(b.registerTime) - new Date(a.registerTime);
      });
      mpState.search = '';
      mpState.statusFilter = '';
      mpState.subscribeFilter = '';
      mpState.page = 1;
      mpState.selectedIds = [];
      applyMpFilters();
      bindMpEvents();
    }

    function applyMpFilters() {
      var data = mpState.allData;
      if (mpState.search) {
        var kw = mpState.search.toLowerCase();
        data = data.filter(function (m) {
          return m.name.toLowerCase().indexOf(kw) !== -1 || m.appId.toLowerCase().indexOf(kw) !== -1;
        });
      }
      if (mpState.statusFilter) {
        data = data.filter(function (m) { return m.status === mpState.statusFilter; });
      }
      if (mpState.subscribeFilter === 'on') {
        data = data.filter(function (m) { return m.subscribeOn; });
      } else if (mpState.subscribeFilter === 'off') {
        data = data.filter(function (m) { return !m.subscribeOn; });
      }
      mpState.filtered = data;
      mpState.page = Math.min(mpState.page, Math.max(1, Math.ceil(data.length / mpState.pageSize)));
      renderMpTable();
      renderMpPagination();
      updateMpBatchBtns();
    }

    function renderMpTable() {
      var tbody = document.getElementById('mpTableBody');
      if (!tbody) return;

      var start = (mpState.page - 1) * mpState.pageSize;
      var pageData = mpState.filtered.slice(start, start + mpState.pageSize);

      if (pageData.length === 0) {
        tbody.innerHTML = '<tr><td colspan="9"><div class="empty-state"><div class="empty-state-icon">📱</div><div class="empty-state-text">暂无小程序数据</div></div></td></tr>';
        return;
      }

      var statusMap = { normal: { cls: 'tag-success', label: '正常' }, auditing: { cls: 'tag-warning', label: '审核中' }, stopped: { cls: 'tag-default', label: '已停用' } };
      var deployMap = { online: { cls: 'deploy-online', label: '已上线' }, reviewing: { cls: 'deploy-reviewing', label: '审核中' }, deploying: { cls: 'deploy-deploying', label: '部署中' } };

      tbody.innerHTML = pageData.map(function (m) {
        var st = statusMap[m.status] || statusMap.normal;
        var dp = deployMap[m.deployStatus] || deployMap.deploying;
        var checked = mpState.selectedIds.indexOf(m.id) !== -1 ? ' checked' : '';
        var subChecked = m.subscribeOn ? ' checked' : '';
        return '<tr>' +
          '<td><input type="checkbox" class="checkbox mp-row-check" data-id="' + m.id + '"' + checked + '></td>' +
          '<td><a href="javascript:;" class="mp-detail-link" data-id="' + m.id + '" style="font-weight:500;">' + m.name + '</a></td>' +
          '<td style="font-size:12px;color:#666;">' + m.appId + '</td>' +
          '<td>' + m.type + '</td>' +
          '<td><span class="' + dp.cls + '">' + dp.label + '</span></td>' +
          '<td>' +
            '<div class="subscribe-switch-cell">' +
              '<label class="switch"><input type="checkbox" class="mp-sub-toggle" data-id="' + m.id + '"' + subChecked + '><span class="switch-slider"></span></label>' +
              '<span style="font-size:12px;color:' + (m.subscribeOn ? '#52c41a' : '#999') + ';">' + (m.subscribeOn ? '已开启' : '已关闭') + '</span>' +
            '</div>' +
          '</td>' +
          '<td>' + m.registerTime + '</td>' +
          '<td><span class="tag ' + st.cls + '">' + st.label + '</span></td>' +
          '<td>' +
            '<button class="btn btn-link btn-sm mp-detail-link" data-id="' + m.id + '">查看详情</button>' +
            '<button class="btn btn-link btn-sm mp-edit-link" data-id="' + m.id + '">编辑</button>' +
          '</td>' +
        '</tr>';
      }).join('');

      // 重新绑定行内事件
      bindMpRowEvents();
    }

    function bindMpRowEvents() {
      // 行复选框
      document.querySelectorAll('.mp-row-check').forEach(function (cb) {
        cb.addEventListener('change', function () {
          var id = this.getAttribute('data-id');
          if (this.checked) {
            if (mpState.selectedIds.indexOf(id) === -1) mpState.selectedIds.push(id);
          } else {
            mpState.selectedIds = mpState.selectedIds.filter(function (x) { return x !== id; });
          }
          updateMpBatchBtns();
          // 同步全选框
          syncSelectAll();
        });
      });

      // 订阅开关
      document.querySelectorAll('.mp-sub-toggle').forEach(function (sw) {
        sw.addEventListener('change', function () {
          var id = this.getAttribute('data-id');
          var mp = findMpById(id);
          if (mp) {
            mp.subscribeOn = this.checked;
            window.showToast('小程序"' + mp.name + '"订阅已' + (mp.subscribeOn ? '开启' : '关闭'), 'success');
            renderMpTable();
            renderMpPagination();
          }
        });
      });

      // 查看详情
      document.querySelectorAll('.mp-detail-link').forEach(function (link) {
        link.addEventListener('click', function (e) {
          e.preventDefault();
          var id = this.getAttribute('data-id');
          openMpDetailModal(id);
        });
      });

      // 编辑
      document.querySelectorAll('.mp-edit-link').forEach(function (link) {
        link.addEventListener('click', function (e) {
          e.preventDefault();
          var id = this.getAttribute('data-id');
          openMpFormModal(id);
        });
      });
    }

    function renderMpPagination() {
      var el = document.getElementById('mpPagination');
      if (!el) return;
      var total = Math.ceil(mpState.filtered.length / mpState.pageSize);
      if (total <= 1) { el.innerHTML = '<span class="page-info">共 ' + mpState.filtered.length + ' 条</span>'; return; }

      var html = '<span class="page-info">共 ' + mpState.filtered.length + ' 条</span>';
      html += '<button class="page-btn"' + (mpState.page <= 1 ? ' disabled' : '') + ' data-page="' + (mpState.page - 1) + '">上一页</button>';
      for (var i = 1; i <= total; i++) {
        html += '<button class="page-btn' + (i === mpState.page ? ' active' : '') + '" data-page="' + i + '">' + i + '</button>';
      }
      html += '<button class="page-btn"' + (mpState.page >= total ? ' disabled' : '') + ' data-page="' + (mpState.page + 1) + '">下一页</button>';
      el.innerHTML = html;

      el.querySelectorAll('.page-btn').forEach(function (btn) {
        btn.addEventListener('click', function () {
          var p = parseInt(this.getAttribute('data-page'));
          if (p >= 1 && p <= total) { mpState.page = p; renderMpTable(); renderMpPagination(); }
        });
      });
    }

    function syncSelectAll() {
      var start = (mpState.page - 1) * mpState.pageSize;
      var pageData = mpState.filtered.slice(start, start + mpState.pageSize);
      var allChecked = pageData.length > 0 && pageData.every(function (m) { return mpState.selectedIds.indexOf(m.id) !== -1; });
      var selectAll = document.getElementById('mpSelectAll');
      if (selectAll) selectAll.checked = allChecked;
    }

    function updateMpBatchBtns() {
      var hasSelection = mpState.selectedIds.length > 0;
      document.getElementById('btnBatchSubscribe').style.display = hasSelection ? '' : 'none';
      document.getElementById('btnBatchUnsubscribe').style.display = hasSelection ? '' : 'none';
      if (!hasSelection) {
        var sel = document.getElementById('mpSelectAll');
        if (sel) sel.checked = false;
      }
    }

    function findMpById(id) {
      return mpState.allData.find(function (m) { return m.id === id; });
    }

    function bindMpEvents() {
      // 全选
      var selectAll = document.getElementById('mpSelectAll');
      if (selectAll) {
        selectAll.addEventListener('change', function () {
          var start = (mpState.page - 1) * mpState.pageSize;
          var pageData = mpState.filtered.slice(start, start + mpState.pageSize);
          if (this.checked) {
            pageData.forEach(function (m) {
              if (mpState.selectedIds.indexOf(m.id) === -1) mpState.selectedIds.push(m.id);
            });
          } else {
            var pageIds = pageData.map(function (m) { return m.id; });
            mpState.selectedIds = mpState.selectedIds.filter(function (id) { return pageIds.indexOf(id) === -1; });
          }
          renderMpTable();
          renderMpPagination();
          updateMpBatchBtns();
        });
      }

      // 查询
      var btnSearch = document.getElementById('btnMpSearch');
      if (btnSearch) {
        btnSearch.addEventListener('click', function () {
          mpState.search = document.getElementById('mpSearchInput').value.trim();
          mpState.statusFilter = document.getElementById('mpStatusFilter').value;
          mpState.subscribeFilter = document.getElementById('mpSubscribeFilter').value;
          mpState.page = 1;
          applyMpFilters();
        });
      }

      // 重置
      var btnReset = document.getElementById('btnMpReset');
      if (btnReset) {
        btnReset.addEventListener('click', function () {
          document.getElementById('mpSearchInput').value = '';
          document.getElementById('mpStatusFilter').value = '';
          document.getElementById('mpSubscribeFilter').value = '';
          mpState.search = '';
          mpState.statusFilter = '';
          mpState.subscribeFilter = '';
          mpState.page = 1;
          mpState.selectedIds = [];
          applyMpFilters();
        });
      }

      // 注册小程序
      var btnRegister = document.getElementById('btnRegisterMp');
      if (btnRegister) {
        btnRegister.addEventListener('click', function () { openMpFormModal(null); });
      }

      // 批量开启订阅
      var btnBatchOn = document.getElementById('btnBatchSubscribe');
      if (btnBatchOn) {
        btnBatchOn.addEventListener('click', function () {
          if (mpState.selectedIds.length === 0) return;
          mpState.selectedIds.forEach(function (id) {
            var m = findMpById(id);
            if (m) m.subscribeOn = true;
          });
          window.showToast('已批量开启 ' + mpState.selectedIds.length + ' 个小程序的订阅', 'success');
          mpState.selectedIds = [];
          renderMpTable();
          renderMpPagination();
          updateMpBatchBtns();
        });
      }

      // 批量关闭订阅
      var btnBatchOff = document.getElementById('btnBatchUnsubscribe');
      if (btnBatchOff) {
        btnBatchOff.addEventListener('click', function () {
          if (mpState.selectedIds.length === 0) return;
          mpState.selectedIds.forEach(function (id) {
            var m = findMpById(id);
            if (m) m.subscribeOn = false;
          });
          window.showToast('已批量关闭 ' + mpState.selectedIds.length + ' 个小程序的订阅', 'success');
          mpState.selectedIds = [];
          renderMpTable();
          renderMpPagination();
          updateMpBatchBtns();
        });
      }

      // 回车搜索
      var searchInput = document.getElementById('mpSearchInput');
      if (searchInput) {
        searchInput.addEventListener('keydown', function (e) {
          if (e.key === 'Enter') { document.getElementById('btnMpSearch').click(); }
        });
      }
    }

    // ---- 注册/编辑弹窗 ----
    function openMpFormModal(mpId) {
      var modal = document.getElementById('mpFormModal');
      var titleEl = document.getElementById('mpFormTitle');
      if (!modal || !titleEl) return;

      var editing = mpId ? findMpById(mpId) : null;

      if (editing) {
        titleEl.textContent = '编辑小程序';
        document.getElementById('mpFormName').value = editing.name;
        document.getElementById('mpFormAppId').value = editing.appId;
        document.getElementById('mpFormType').value = editing.type;
        document.getElementById('mpFormDesc').value = editing.desc || '';
      } else {
        titleEl.textContent = '注册小程序';
        document.getElementById('mpFormName').value = '';
        document.getElementById('mpFormAppId').value = '';
        document.getElementById('mpFormType').value = '';
        document.getElementById('mpFormDesc').value = '';
      }

      modal.style.display = 'flex';
      modal.classList.add('modal-animated');

      document.getElementById('mpFormCancel').onclick = function () { closeModalAnimated(modal); };
      document.getElementById('mpFormSubmit').onclick = function () {
        var name = document.getElementById('mpFormName').value.trim();
        var appId = document.getElementById('mpFormAppId').value.trim();
        var type = document.getElementById('mpFormType').value;
        var desc = document.getElementById('mpFormDesc').value.trim();

        if (!name) { window.showToast('请输入小程序名称', 'error'); return; }
        if (!appId) { window.showToast('请输入AppID', 'error'); return; }
        if (!type) { window.showToast('请选择小程序类型', 'error'); return; }

        // 校验 AppID 唯一
        var dup = mpState.allData.find(function (m) { return m.appId === appId && m.id !== mpId; });
        if (dup) { window.showToast('该AppID已存在，请检查', 'error'); return; }

        if (editing) {
          editing.name = name;
          editing.appId = appId;
          editing.type = type;
          editing.desc = desc;
          window.showToast('小程序信息已更新', 'success');
        } else {
          var newMp = {
            id: 'MP' + String(mpState.allData.length + 1).padStart(3, '0'),
            name: name,
            appId: appId,
            type: type,
            status: 'normal',
            deployStatus: 'deploying',
            subscribeOn: true,
            registerTime: new Date().toISOString().replace('T', ' ').slice(0, 19),
            desc: desc
          };
          mpState.allData.unshift(newMp);
          window.MockData.miniPrograms.unshift(newMp);
          window.showToast('小程序注册成功', 'success');
        }

        closeModalAnimated(modal);
        applyMpFilters();
      };

      modal.onclick = function (e) { if (e.target === modal) closeModalAnimated(modal); };
    }

    // ---- 小程序详情弹窗 ----
    function openMpDetailModal(mpId) {
      var modal = document.getElementById('mpDetailModal');
      var content = document.getElementById('mpDetailContent');
      if (!modal || !content) return;

      var mp = findMpById(mpId);
      if (!mp) return;

      var statusMap = { normal: { cls: 'tag-success', label: '正常' }, auditing: { cls: 'tag-warning', label: '审核中' }, stopped: { cls: 'tag-default', label: '已停用' } };
      var deployMap = { online: { cls: 'deploy-online', label: '已上线' }, reviewing: { cls: 'deploy-reviewing', label: '审核中' }, deploying: { cls: 'deploy-deploying', label: '部署中' } };
      var st = statusMap[mp.status] || statusMap.normal;
      var dp = deployMap[mp.deployStatus] || deployMap.deploying;

      var subOps = (window.MockData.operationLogs || []).filter(function (l) {
        return l.action === '开启订阅' || l.action === '关闭订阅';
      }).slice(0, 5);

      content.innerHTML =
        '<div style="margin-bottom:16px;"><strong style="font-size:16px;">' + mp.name + '</strong></div>' +
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px 24px;margin-bottom:20px;font-size:14px;">' +
          '<div><span style="color:#999;">AppID：</span>' + mp.appId + '</div>' +
          '<div><span style="color:#999;">类型：</span>' + mp.type + '</div>' +
          '<div><span style="color:#999;">状态：</span><span class="tag ' + st.cls + '">' + st.label + '</span></div>' +
          '<div><span style="color:#999;">部署状态：</span><span class="' + dp.cls + '">' + dp.label + '</span></div>' +
          '<div><span style="color:#999;">订阅开关：</span><span style="color:' + (mp.subscribeOn ? '#52c41a' : '#999') + ';">' + (mp.subscribeOn ? '已开启' : '已关闭') + '</span></div>' +
          '<div><span style="color:#999;">注册时间：</span>' + mp.registerTime + '</div>' +
          '<div style="grid-column:1/-1;"><span style="color:#999;">描述：</span>' + (mp.desc || '无') + '</div>' +
        '</div>' +

        '<div style="font-weight:600;margin-bottom:12px;font-size:15px;">部署进度</div>' +
        '<div class="timeline">' +
          (window.MockData.deployTimeline || []).map(function (t) {
            var dotCls = t.status === 'done' ? 'done' : 'pending';
            return '<div class="timeline-item"><div class="timeline-dot ' + dotCls + '"></div><div class="timeline-title">' + t.step + '</div><div class="timeline-desc">' + t.time + ' · ' + t.desc + '</div></div>';
          }).join('') +
        '</div>' +

        '<div style="font-weight:600;margin:20px 0 12px;font-size:15px;display:flex;justify-content:space-between;align-items:center;">' +
          '<span>订阅开关操作记录</span>' +
          '<button class="btn btn-link" id="btnViewSubLog">查看全部</button>' +
        '</div>' +
        '<div style="font-size:13px;color:#666;">' +
          (subOps.length > 0
            ? subOps.map(function (l) { return '<div style="padding:6px 0;border-bottom:1px solid #f0f0f0;">' + l.time + ' · ' + l.detail + '</div>'; }).join('')
            : '<div style="color:#999;">暂无订阅操作记录</div>') +
        '</div>';

      modal.style.display = 'flex';
      modal.classList.add('modal-animated');

      document.getElementById('mpDetailClose').onclick = function () { closeModalAnimated(modal); };
      modal.onclick = function (e) { if (e.target === modal) closeModalAnimated(modal); };

      // 查看全部订阅操作记录
      var btnViewLog = document.getElementById('btnViewSubLog');
      if (btnViewLog) {
        btnViewLog.addEventListener('click', function () {
          closeModalAnimated(modal);
          setTimeout(function () { openMpSubscribeLogModal(); }, 250);
        });
      }
    }

    // ---- 订阅操作记录弹窗 ----
    function openMpSubscribeLogModal() {
      var modal = document.getElementById('mpSubscribeLogModal');
      var content = document.getElementById('mpSubscribeLogContent');
      if (!modal || !content) return;

      var logs = (window.MockData.operationLogs || []).filter(function (l) {
        return l.action === '开启订阅' || l.action === '关闭订阅';
      });

      content.innerHTML =
        '<table style="width:100%;"><thead><tr><th>操作时间</th><th>操作类型</th><th>详情</th></tr></thead><tbody>' +
        logs.map(function (l) {
          var cls = l.action === '开启订阅' ? 'tag-success' : 'tag-default';
          return '<tr><td>' + l.time + '</td><td><span class="tag ' + cls + '">' + l.action + '</span></td><td>' + l.detail + '</td></tr>';
        }).join('') +
        '</tbody></table>';

      modal.style.display = 'flex';
      modal.classList.add('modal-animated');

      document.getElementById('mpSubscribeLogClose').onclick = function () { closeModalAnimated(modal); };
      modal.onclick = function (e) { if (e.target === modal) closeModalAnimated(modal); };
    }

    // ================================================================
    //  页面加载回调
    // ================================================================
    window.onPageLoaded = function (page) {
      console.log('Page loaded:', page);
      if (page === 'dashboard') initDashboard();
      if (page === 'miniprogram-list') initMiniprogramList();
      if (page === 'miniprogram-list-empty') { /* 空状态页面自行初始化（内嵌脚本） */ }
      if (page === 'promotion-list') initPromotionList();
      if (page === 'benefit-config') initBenefitConfig();

      // C06 账号设置：子菜单项映射到account页面的对应Tab
      var accountTabMap = { 'account-info': 'info', 'account-pwd': 'pwd', 'account-log': 'log' };
      if (accountTabMap[page] || page === 'account') {
        var tab = accountTabMap[page] || window.__pageTab;
        if (tab) {
          var tabEl = document.querySelector('#accountTabs .tab-item[data-tab="' + tab + '"]');
          if (tabEl) tabEl.click();
        }
        window.__pageTab = null;
      }
    };
  </script>

</body>
</html>
